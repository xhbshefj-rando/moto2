<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Motocross Simulator</title>
    <style>
        /* Force sky-blue background via CSS so a black screen is physically impossible */
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top:0; left:0; z-index: 1; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; z-index: 10; }
        h1 { margin: 0 0 5px 0; font-size: 24px; }
        p { margin: 5px 0; font-size: 14px; }
        .controls { margin-top: 15px; font-size: 12px; opacity: 0.9; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }
    </style>
    <!-- Solid, rock-stable release of Three.js via highly available CDN -->
    <script src="https://cloudflare.com"></script>
</head>
<body>
    <div id="ui">
        <h1>3D MOTO SIM</h1>
        <p>Speed: <span id="speed">0</span> km/h</p>
        <p>Airtime: <span id="airtime">0.0</span>s</p>
        <div class="controls">
            <b>W / S</b> : Throttle / Brake<br>
            <b>A / D</b> : Steering<br>
            <b>Arrow Up / Down</b> : Pitch Nose (In Air)
        </div>
    </div>
    <div id="canvas-container"></div>

    <script>
        // Native safe linear interpolation formula (No Three.js dependency)
        function nativeLerp(start, end, amt) {
            return (1 - amt) * start + amt * end;
        }

        // --- MATH-BASED GROUND EQUATION ---
        // Generates identical terrain heights dynamically without reading from raw 3D mesh vertices
        function getTrackHeightPureMath(x, z) {
            if (Math.abs(x) > 500 || Math.abs(z) > 500) return 0; // Boundary limit
            
            // Base rolling hills layout
            var height = Math.sin(x * 0.015) * Math.cos(z * 0.015) * 12;
            
            // Whoops track bumps section
            height += Math.sin(z * 0.15) * Math.cos(x * 0.05) * 1.5; 
            
            // Massive jump table ramp
            if (z > 40 && z < 160 && Math.abs(x) < 50) {
                height += Math.sin((z - 40) * Math.PI / 120) * 20; 
            }
            return height;
        }

        // --- MOTORCYCLE PHYSICS DATA ---
        var bike = {
            x: 0, y: 20, z: 0,
            vx: 0, vy: 0, vz: 0,
            speed: 0, heading: 0, pitch: 0, roll: 0,
            isGrounded: false, airTime: 0
        };

        var CONTROLS = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false };
        var GRAVITY = 0.22;
        var ACCELERATION = 0.12;
        var MAX_SPEED = 1.5;
        var FRICTION = 0.02;

        // --- SETUP RENDER ENGINE ---
        var container = document.getElementById('canvas-container');
        var scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.004);

        var camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1500);
        var renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // --- LIGHTING ENVIRONMENT ---
        var ambient = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambient);
        var sunLight = new THREE.DirectionalLight(0xfffaed, 1.2);
        sunLight.position.set(100, 300, 100);
        scene.add(sunLight);

        // --- CONSTRUCT TERRAIN VISUAL MESH ---
        var terrainGeo = new THREE.PlaneGeometry(1000, 1000, 70, 70);
        terrainGeo.rotateX(-Math.PI / 2); 

        // Style and manipulate geometry vertices using native array mapping safely
        var posAttribute = terrainGeo.attributes.position;
        for (var i = 0; i < posAttribute.count; i++) {
            var vx = posAttribute.getX(i);
            var vz = posAttribute.getZ(i);
            var vy = getTrackHeightPureMath(vx, vz);
            posAttribute.setY(i, vy);
        }
        terrainGeo.computeVertexNormals();

        var terrainMat = new THREE.MeshStandardMaterial({ 
            color: 0x9f5f3f, 
            roughness: 0.95,
            flatShading: true 
        });
        var terrainMesh = new THREE.Mesh(terrainGeo, terrainMat);
        scene.add(terrainMesh);

        // --- CONSTRUCT BIKE GRAPHICS GROUP ---
        var bikeGroup = new THREE.Group();
        
        // Lower frame/engine casing block
        var coreChassis = new THREE.Mesh(
            new THREE.BoxGeometry(0.35, 0.5, 1.4),
            new THREE.MeshStandardMaterial({ color: 0x111111 })
        );
        coreChassis.position.y = 0.5;
        bikeGroup.add(coreChassis);

        // High visibility racing fairing
        var plastics = new THREE.Mesh(
            new THREE.BoxGeometry(0.4, 0.25, 1.2),
            new THREE.MeshStandardMaterial({ color: 0xff4500 }) 
        );
        plastics.position.set(0, 0.75, -0.1);
        bikeGroup.add(plastics);

        // Wheels
        var wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.25, 12);
        wheelGeo.rotateZ(Math.PI / 2);
        var wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 1.0 });

        var frontWheel = new THREE.Mesh(wheelGeo, wheelMat);
        frontWheel.position.set(0, 0.45, 0.8);
        bikeGroup.add(frontWheel);

        var rearWheel = new THREE.Mesh(wheelGeo, wheelMat);
        rearWheel.position.set(0, 0.45, -0.8);
        bikeGroup.add(rearWheel);

        scene.add(bikeGroup);

        // --- CONFIG HARDWARE EVENT HOOKS ---
        window.addEventListener('keydown', function(e) { if(e.key in CONTROLS) CONTROLS[e.key] = true; });
        window.addEventListener('keyup', function(e) { if(e.key in CONTROLS) CONTROLS[e.key] = false; });
        window.addEventListener('resize', function() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        var speedUI = document.getElementById('speed');
        var airtimeUI = document.getElementById('airtime');

        // --- RUNNING FRAME RUNTIME ENGINE ---
        function frame() {
            requestAnimationFrame(frame);

            // 1. Steering & Banking Angular calculations
            if (CONTROLS.a) {
                if (bike.isGrounded) bike.heading += 0.025 * (bike.speed / MAX_SPEED + 0.2);
                bike.roll = nativeLerp(bike.roll, 0.35, 0.1);
            } else if (CONTROLS.d) {
                if (bike.isGrounded) bike.heading -= 0.025 * (bike.speed / MAX_SPEED + 0.2);
                bike.roll = nativeLerp(bike.roll, -0.35, 0.1);
            } else {
                bike.roll = nativeLerp(bike.roll, 0, 0.15);
            }

            // 2. Air control inputs
            if (!bike.isGrounded) {
                if (CONTROLS.ArrowUp) bike.pitch -= 0.035;
                if (CONTROLS.ArrowDown) bike.pitch += 0.035;
            }

            // 3. Engine Velocity management
            if (CONTROLS.w) {
                bike.speed = Math.min(bike.speed + ACCELERATION, MAX_SPEED);
            } else if (CONTROLS.s) {
                bike.speed = Math.max(bike.speed - ACCELERATION * 1.3, -MAX_SPEED * 0.25);
            } else {
                bike.speed = nativeLerp(bike.speed, 0, FRICTION);
            }

            // 4. Transform positions along direction vectors
            if (bike.isGrounded) {
                bike.vx = Math.sin(bike.heading) * bike.speed;
                bike.vz = Math.cos(bike.heading) * bike.speed;
                bike.vy = 0;
            } else {
                bike.vy -= GRAVITY * 0.12; 
            }

            bike.x += bike.vx;
            bike.y += bike.vy;
            bike.z += bike.vz;

            // 5. Collision processing using pure safe mathematical functions
            var currentGround = getTrackHeightPureMath(bike.x, bike.z);
            var groundClearance = 0.45;

            if (bike.y <= currentGround + groundClearance) {
                bike.y = currentGround + groundClearance;
                
                // Track slope matching lookahead calculations
                var forwardHeight = getTrackHeightPureMath(bike.x + Math.sin(bike.heading) * 2, bike.z + Math.cos(bike.heading) * 2);
                var surfaceSlope = Math.atan2(currentGround - forwardHeight, 2);
                
                bike.pitch = nativeLerp(bike.pitch, surfaceSlope, 0.25);
                bike.isGrounded = true;
                bike.airTime = 0;
            } else {
                bike.isGrounded = false;
                bike.airTime += 1 / 60;
            }

            // Keep bike within sandbox boundary limits
            bike.x = Math.max(-480, Math.min(480, bike.x));
            bike.z = Math.max(-480, Math.min(480, bike.z));

            // 6. Apply positional transforms to models
            bikeGroup.position.set(bike.x, bike.y, bike.z);
            bikeGroup.rotation.set(0, 0, 0); 
            bikeGroup.rotateY(bike.heading + Math.PI); 
            bikeGroup.rotateX(bike.pitch);
            bikeGroup.rotateZ(bike.roll);

            // Wheel Spin Animations
            frontWheel.rotation.x += bike.speed * 0.4;
            rearWheel.rotation.x += bike.speed * 0.4;

            // 7. Dynamic Chase Camera Position tracking
            var targetCamX = bike.x - Math.sin(bike.heading) * 7.5;
            var targetCamZ = bike.z - Math.cos(bike.heading) * 7.5;
            var targetCamY = bike.y + 3.2;

            camera.position.x = nativeLerp(camera.position.x, targetCamX, 0.07);
            camera.position.y = nativeLerp(camera.position.y, targetCamY, 0.07);
