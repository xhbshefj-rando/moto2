<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Browser Motocross Sim</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top:0; left:0; z-index: 1; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; z-index: 10; }
        h1 { margin: 0 0 5px 0; font-size: 24px; }
        p { margin: 5px 0; font-size: 14px; }
        .controls { margin-top: 15px; font-size: 12px; opacity: 0.9; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 5px; }
    </style>

    <!-- Secure Import Map to guarantee Three.js loads with no dependency errors -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com"
        }
      }
    </script>
</head>
<body>
    <div id="ui">
        <h1>3D MOTO SIM</h1>
        <p>Speed: <span id="speed">0</span> km/h</p>
        <p>Airtime: <span id="airtime">0.0</span>s</p>
        <div class="controls">
            <b>W / S</b> : Throttle / Brake<br>
            <b>A / D</b> : Steering<br>
            <b>Arrow Up / Down</b> : Air Pitch (Lean Forward/Back)
        </div>
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';

        // --- SIMULATION STATE ---
        const bike = {
            x: 0, y: 15, z: 0,
            vx: 0, vy: 0, vz: 0,
            speed: 0, heading: 0, pitch: 0, roll: 0,
            isGrounded: false, airTime: 0
        };

        const CONTROLS = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false };
        const GRAVITY = 0.22;
        const ACCELERATION = 0.12;
        const MAX_SPEED = 1.4;
        const FRICTION = 0.02;
        const TRACK_SIZE = 1000;

        // --- INITIALIZE SCENE ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.004);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1500);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // --- ENVIRONMENT LIGHTS ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);
        const sunLight = new THREE.DirectionalLight(0xfffaed, 1.2);
        sunLight.position.set(150, 400, 100);
        scene.add(sunLight);

        // --- GENERATE PROCEDURAL MX DIRT TRACK ---
        const terrainGeo = new THREE.PlaneGeometry(TRACK_SIZE, TRACK_SIZE, 100, 100);
        terrainGeo.rotateX(-Math.PI / 2); // Flatten out plane to act as ground floor

        const positions = terrainGeo.attributes.position;
        for (let i = 0; i < positions.count; i++) {
            let x = positions.getX(i);
            let z = positions.getZ(i);
            
            // Layer 1: Rolling hillside tracks
            let height = Math.sin(x * 0.015) * Math.cos(z * 0.015) * 12;
            // Layer 2: Rapid track bumps (Whoops sections)
            height += Math.sin(z * 0.15) * Math.cos(x * 0.05) * 1.8;
            
            // Layer 3: Massive customized launch ramps
            if (z > 40 && z < 160 && Math.abs(x) < 50) {
                height += Math.sin((z - 40) * Math.PI / 120) * 20; 
            }
            if (x > -250 && x < -100 && Math.abs(z) < 60) {
                height += Math.sin((x + 250) * Math.PI / 150) * 25;
            }

            positions.setY(i, height);
        }
        terrainGeo.computeVertexNormals();

        // High visibility clay-colored ground material
        const terrainMat = new THREE.MeshStandardMaterial({ 
            color: 0x9f5f3f, 
            roughness: 0.9,
            flatShading: true 
        });
        const terrain = new THREE.Mesh(terrainGeo, terrainMat);
        scene.add(terrain);

        // --- BUILD 3D BIKE SYSTEM COMPOSED OF PRIMITIVES ---
        const bikeGroup = new THREE.Group();
        
        // Chassis Main Engine Case
        const chassis = new THREE.Mesh(
            new THREE.BoxGeometry(0.35, 0.5, 1.4),
            new THREE.MeshStandardMaterial({ color: 0x111111 })
        );
        chassis.position.y = 0.5;
        bikeGroup.add(chassis);

        // Bright MX Fairings/Plastics
        const fairings = new THREE.Mesh(
            new THREE.BoxGeometry(0.4, 0.25, 1.2),
            new THREE.MeshStandardMaterial({ color: 0xff4500, roughness: 0.1 }) // Factory Racing Orange
        );
        fairings.position.set(0, 0.75, -0.1);
        bikeGroup.add(fairings);

        // Front Fork assembly setup
        const forkGroup = new THREE.Group();
        const forks = new THREE.Mesh(
            new THREE.CylinderGeometry(0.04, 0.04, 1.1),
            new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.7 })
        );
        forks.position.set(0, 0.5, 0.6);
        forks.rotation.x = 0.25; 
        forkGroup.add(forks);

        const bars = new THREE.Mesh(
            new THREE.CylinderGeometry(0.02, 0.02, 0.95),
            new THREE.MeshStandardMaterial({ color: 0x111111 })
        );
        bars.rotation.z = Math.PI / 2;
        bars.position.set(0, 1.05, 0.5);
        forkGroup.add(bars);
        bikeGroup.add(forkGroup);

        // Heavy-duty knobby tires
        const tireGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.28, 16);
        tireGeo.rotateZ(Math.PI / 2); // Orient wheels vertically
        const tireMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 1.0 });

        const frontWheel = new THREE.Mesh(tireGeo, tireMat);
        frontWheel.position.set(0, 0.45, 0.8);
        bikeGroup.add(frontWheel);

        const rearWheel = new THREE.Mesh(tireGeo, tireMat);
        rearWheel.position.set(0, 0.45, -0.8);
        bikeGroup.add(rearWheel);

        scene.add(bikeGroup);

        // --- MATH RE-CALCULATION FOR ELEVATION MOVEMENT ---
        function getTrackHeight(x, z) {
            const half = TRACK_SIZE / 2;
            const gridCells = 100;
            const spacing = TRACK_SIZE / gridCells;
            
            let xCell = Math.floor((x + half) / spacing);
            let zCell = Math.floor((z + half) / spacing);
            
            if(xCell < 0 || xCell >= gridCells || zCell < 0 || zCell >= gridCells) return 0;
            
            const index = (zCell * (gridCells + 1)) + xCell;
            if(index >= 0 && index < positions.count) {
                return positions.getY(index);
            }
            return 0;
        }

        // --- WINDOW HARDWARE EVENT DETECTORS ---
        window.addEventListener('keydown', (e) => { if(e.key in CONTROLS) CONTROLS[e.key] = true; });
        window.addEventListener('keyup', (e) => { if(e.key in CONTROLS) CONTROLS[e.key] = false; });
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const speedUI = document.getElementById('speed');
        const airtimeUI = document.getElementById('airtime');

        // --- RUNNING REAL TIME PHYSICS FRAME ENGINE ---
        function loop() {
            requestAnimationFrame(loop);

            // Turn Handling
            if (CONTROLS.a) {
                if (bike.isGrounded) bike.heading += 0.026 * (bike.speed / MAX_SPEED + 0.15);
                bike.roll = THREE.MathUtils.lerp(bike.roll, 0.35, 0.1);
            } else if (CONTROLS.d) {
                if (bike.isGrounded) bike.heading -= 0.026 * (bike.speed / MAX_SPEED + 0.15);
                bike.roll = THREE.MathUtils.lerp(bike.roll, -0.35, 0.1);
            } else {
                bike.roll = THREE.MathUtils.lerp(bike.roll, 0, 0.15);
            }

            // Airborne Pitch controls (leaning over jumps)
            if (!bike.isGrounded) {
                if (CONTROLS.ArrowUp) bike.pitch -= 0.035;
                if (CONTROLS.ArrowDown) bike.pitch += 0.035;
            }

            // Throttle & Brake Management
            if (CONTROLS.w) {
                bike.speed = Math.min(bike.speed + ACCELERATION, MAX_SPEED);
            } else if (CONTROLS.s) {
                bike.speed = Math.max(bike.speed - ACCELERATION * 1.3, -MAX_SPEED * 0.25);
            } else {
                bike.speed = THREE.MathUtils.lerp(bike.speed, 0, FRICTION);
            }

            // Vector Velocity steps
            if (bike.isGrounded) {
                bike.vx = Math.sin(bike.heading) * bike.speed;
                bike.vz = Math.cos(bike.heading) * bike.speed;
                bike.vy = 0;
            } else {
                bike.vy -= GRAVITY * 0.12; // Acceleration down due to gravity force
            }

            bike.x += bike.vx;
            bike.y += bike.vy;
            bike.z += bike.vz;

            // Ground checking system calculations
            const currentGround = getTrackHeight(bike.x, bike.z);
            const groundClearance = 0.45;

            if (bike.y <= currentGround + groundClearance) {
                bike.y = currentGround + groundClearance;
                
                // Read slope angles out in front to pitch bike frame up or down automatically
                const forwardHeight = getTrackHeight(bike.x + Math.sin(bike.heading)*2, bike.z + Math.cos(bike.heading)*2);
