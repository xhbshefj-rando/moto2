<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>First Person 3D Moto Sim</title> 
    <style> 
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        } 
        body, html { 
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif; 
            background: #070714;
            user-select: none;
        } 
        
        #game-container {
            width: 100%;
            height: 100%;
            position: absolute;
            overflow: hidden;
        }

        /* 3D Sky Backdrop Canvas */
        #sky-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to bottom, #020208, #11112b);
            overflow: hidden;
        }

        /* Dynamic Horizon Sun / Moon Aura Glow */
        #horizon-glow {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 100px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.3) 0%, rgba(0,0,0,0) 70%);
        }

        /* Hardware Accelerated Rendering Field for Pseudo-3D Track Segments */
        #render-surface {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: #1e120a; /* Fallback Base Dirt */
            overflow: hidden;
        }

        /* 1st Person Cockpit View Handlebars & Dashboard UI overlay */
        #cockpit-view {
            position: absolute;
            bottom: -20px;
            left: 50%;
            width: 500px;
            height: 300px;
            transform: translateX(-50%);
            pointer-events: none;
            z-index: 500;
            transition: transform 0.05s ease;
        }

        .handlebar-left {
            position: absolute;
            width: 180px;
            height: 25px;
            background: #222;
            border: 4px solid #444;
            left: 20px;
            bottom: 120px;
            transform: rotate(15deg);
            border-radius: 10px 0 0 10px;
        }

        .handlebar-right {
            position: absolute;
            width: 180px;
            height: 25px;
            background: #222;
            border: 4px solid #444;
            right: 20px;
            bottom: 120px;
            transform: rotate(-15deg);
            border-radius: 0 10px 10px 0;
        }

        .bike-fairing-center {
            position: absolute;
            width: 160px;
            height: 140px;
            background: #00d4ff; /* Custom Paint Panel */
            bottom: 0;
            left: 170px;
            border-radius: 50px 50px 0 0;
            border: 5px solid #111;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        .digital-dash {
            position: absolute;
            width: 100%;
            height: 60px;
            background: #111;
            bottom: 0;
            border-top: 3px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #00d4ff;
            font-family: monospace;
            font-weight: bold;
            font-size: 1.2em;
            text-shadow: 0 0 5px #00d4ff;
        }

        /* Custom UI HUD Overlays */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            pointer-events: none;
        }

        .hud-display {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00d4ff;
            font-size: 1.8em;
            font-weight: bold;
            font-family: monospace;
            background: rgba(0,0,0,0.75);
            padding: 12px 25px;
            border-radius: 8px;
            border: 1px solid rgba(0,212,255,0.4);
            text-shadow: 0 0 8px rgba(0,212,255,0.6);
        }

        .settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: auto;
            background: rgba(0, 212, 255, 0.2);
            border: 2px solid #00d4ff;
            color: #00d4ff;
            padding: 12px 25px;
            font-size: 1em;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .settings-btn:hover {
            background: #00d4ff;
            color: #000;
            box-shadow: 0 0 15px #00d4ff;
        }

        /* Option Customizer Window Overlay */
        .settings-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 360px;
            background: rgba(10, 10, 25, 0.98);
            border: 2px solid #00d4ff;
            border-radius: 15px;
            padding: 25px;
            color: #fff;
            display: none;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.5);
            pointer-events: auto;
        }

        .settings-panel.active {
            display: block;
        }

        .settings-panel h2 {
            text-align: center;
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 1.4em;
            text-transform: uppercase;
        }

        .setting-group {
            margin-bottom: 18px;
        }

        .setting-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 0.8em;
            color: #888;
            text-transform: uppercase;
        }

        .setting-options {
            display: flex;
            gap: 10px;
        }

        .opt-btn {
            flex: 1;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .opt-btn.selected {
            background: rgba(0, 212, 255, 0.25);
            border-color: #00d4ff;
            color: #00d4ff;
        }

        .close-settings {
            width: 100%;
            padding: 12px;
            background: #00d4ff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
        }

        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 0.85em;
            color: #aaa;
            line-height: 1.4;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 18px;
            border-radius: 8px;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        /* 3D Dynamic Drawing Canvas Elements styling */
        .road-slice {
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
        }
    </style>
</head> 
<body>

    <div id="game-container">
        <!-- Sky & Horizon -->
        <div id="sky-bg">
            <div id="horizon-glow"></div>
        </div>
        
        <!-- Hardware Render Canvas context for pseudo 3D track line calculation strips -->
        <div id="render-surface"></div>

        <!-- Cockpit Dashboard HUD Assets Layer -->
        <div id="cockpit-view">
            <div class="handlebar-left" id="l-bar"></div>
            <div class="handlebar-right" id="r-bar"></div>
            <div class="bike-fairing-center" id="b-fairing">
                <div class="digital-dash" id="dash-rpm">RPM: 0</div>
            </div>
        </div>
    </div>

    <!-- UI Overlay Layer HUD elements -->
    <div class="ui-layer">
        <div class="hud-display">SPEED: <span id="speedTxt">0</span> MPH</div>
        
        <button class="settings-btn" onclick="toggleDashboardSettings()">Settings</button>
        
        <div class="settings-panel" id="settingsPanel">
            <h2>Simulator Setup</h2>
            
            <div class="setting-group">
                <label>TRACK BIOME ENVIRONMENT</label>
                <div class="setting-options">
                    <button class="opt-btn selected" id="env-dirt" onclick="changeBiomeTheme('dirt')">Dirt Desert</button>
                    <button class="opt-btn" id="env-street" onclick="changeBiomeTheme('street')">Neon Highway</button>
                </div>
            </div>
            
            <div class="setting-group">
                <label>BIKE COCKPIT TRIMS PAINT</label>
                <div class="setting-options">
                    <button class="opt-btn selected" id="col-cyan" onclick="changeFairingColor('#00d4ff', 'cyan')">Cyan</button>
                    <button class="opt-btn" id="col-red" onclick="changeFairingColor('#ff3333', 'red')">Red</button>
                    <button class="opt-btn" id="col-yellow" onclick="changeFairingColor('#ffcc00', 'yellow')">Yellow</button>
                </div>
            </div>

            <div class="setting-group">
                <label>SIMULATOR ENGINE TUNING</label>
                <div class="setting-options">
                    <button class="opt-btn selected" id="wh-normal" onclick="changeEngineTuning('normal')">Stock 250cc</button>
