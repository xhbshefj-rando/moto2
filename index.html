<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>3D Pro Motocross Simulator - Final Fixed Build</title> 
    <style> 
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        } 
        body, html { 
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #03030c;
            font-family: 'Arial', sans-serif;
            user-select: none;
        } 
        
        #game-viewport {
            width: 100%;
            height: 100%;
            position: absolute;
            background: #04040d;
            overflow: hidden;
        }

        /* Fixed Sky Background - No Black Bars Allowed */
        #sky-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 45%;
            background: linear-gradient(to bottom, #020205, #110d24);
            border-bottom: 4px solid #ffaa00;
        }

        /* Mountain Horizon Vector Line - Completely covers the horizon seam */
        #mountains {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40px;
            background: #0a0714;
            clip-path: polygon(0% 100%, 10% 40%, 25% 80%, 40% 30%, 55% 70%, 70% 20%, 85% 60%, 100% 40%, 100% 100%);
        }

        /* 2D Projected High-Contrast Ground Track (No 3D tags to cause clipping bugs) */
        #ground-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 55%;
            background: #1f140d; /* High-contrast rich charcoal/brown dirt - No ugly tan color */
            overflow: hidden;
        }

        /* High-Visibility Vector Lane Elements */
        .track-marker {
            position: absolute;
            background: #ffaa00; /* High-vis neon orange standard lane */
            width: 10px;
            height: 40px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 15px #ffaa00;
        }

        /* First-Person Dirt Bike Cockpit Assembly */
        #bike-handlebar-cockpit {
            position: absolute;
            bottom: -30px;
            left: 50%;
            width: 580px;
            height: 300px;
            transform: translateX(-50%) rotate(0deg);
            transform-origin: bottom center;
            pointer-events: none;
            z-index: 999;
        }

        /* Main Crossbar Tube Frame */
        .handlebar-stem {
            position: absolute;
            width: 480px;
            height: 20px;
            background: #2b2b2b;
            border: 3px solid #111;
            left: 50px;
            bottom: 120px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
        }

        /* Protective Cushion Foam Pad */
        .handlebar-foam-pad {
            position: absolute;
            width: 160px;
            height: 30px;
            background: #0d0d0d;
            border: 2px solid #ffaa00;
            left: 210px;
            bottom: 130px;
            border-radius: 6px;
            color: #fff;
            font-family: monospace;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 10px rgba(0,0,0,0.5);
        }

        /* Left/Right Rubber Hand Grips */
        .grip-left {
            position: absolute;
            width: 70px;
            height: 30px;
            background: #111;
            left: 50px;
            bottom: 115px;
            border-radius: 6px 0 0 6px;
            border-left: 6px solid #ffaa00;
        }

        .grip-right {
            position: absolute;
            width: 70px;
            height: 30px;
            background: #111;
            right: 50px;
            bottom: 115px;
            border-radius: 0 6px 6px 0;
            border-right: 6px solid #ffaa00;
        }

        /* Front Number Plate Plastics Fairing Shield */
        .front-number-plate-shield {
            position: absolute;
            width: 140px;
            height: 125px;
            background: #ff5500; /* Standard factory pro orange */
            bottom: 10px;
            left: 220px;
            border-radius: 30px 30px 10px 10px;
            border: 5px solid #111;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        /* LCD Dashboard Speed Screen Panel */
        .dashboard-screen {
            position: absolute;
            width: 90px;
            height: 40px;
            background: #040408;
            bottom: 15px;
            left: 20px;
            border-radius: 4px;
            border: 2px solid #222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #00ffcc;
            font-family: monospace;
            font-size: 11px;
            font-weight: bold;
            text-shadow: 0 0 5px #00ffcc;
        }

        /* Interactive Options Button Layer */
        .ui-menu-layer {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10000;
            pointer-events: auto;
        }

        .toggle-menu-btn {
            background: rgba(255, 170, 0, 0.2);
            border: 2px solid #ffaa00;
            color: #ffaa00;
            padding: 10px 20px;
            font-size: 0.9em;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toggle-menu-btn:hover {
            background: #ffaa00;
            color: #000;
            box-shadow: 0 0 15px #ffaa00;
        }

        /* Setup panel selector window */
        .customizer-drawer {
            position: absolute;
            top: 50px;
            right: 0;
            width: 280px;
            background: rgba(10, 10, 20, 0.98);
            border: 2px solid #ffaa00;
            border-radius: 10px;
            padding: 20px;
            color: #fff;
            display: none;
            box-shadow: 0 0 30px rgba(255, 170, 0, 0.4);
        }

        .customizer-drawer.active {
            display: block;
        }

        .option-label {
            font-size: 0.75em;
            color: #888;
            margin-bottom: 5px;
            font-weight: bold;
            text-transform: uppercase;
            display: block;
            margin-top: 10px;
        }

        .btn-row-flex {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .menu-action-btn {
            flex: 1;
            padding: 8px 4px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: bold;
            text-align: center;
        }

        .menu-action-btn.selected {
            background: rgba(255, 170, 0, 0.25);
            border-color: #ffaa00;
            color: #ffaa00;
        }

        /* Standard static dashboard HUD panel overlays */
        .hud-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffaa00;
            font-size: 1.8em;
            font-weight: bold;
            font-family: monospace;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255,170,0,0.4);
            z-index: 1000;
        }

        .hint-overlay-card {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85em;
            background: rgba(0,0,0,0.85);
            padding: 10px 15px;
            border-radius: 6px;
            pointer-events: none;
            line-height: 1.4;
            border: 1px solid rgba(255, 170, 0, 0.2);
            z-index: 1000;
        }
    </style>
</head> 
<body>

    <div id="game-viewport">
        <!-- Sky & Horizon (No clipping black spaces allowed) -->
        <div id="sky-layer">
            <div id="mountains"></div>
        </div>

        <!-- Ground Field -->
        <div id="ground-layer">
            <!-- 10 high contrast track lanes built safely here -->
        </div>

        <!-- 1st Person Bike Component (Always active and visible) -->
        <div id="bike-handlebar-cockpit">
            <div class="handlebar-stem"></div>
            <div class="grip-left" id="trim-grip-l"></div>
            <div class="grip-right" id="trim-grip-r"></div>
            <div class="handlebar-foam-pad" id="trim-pad">PRO BIKE 3D</div>
            
            <div class="front-number-plate-shield" id="bike-plastics">
                <div class="dashboard-screen">
                    <div id="lcd-speed-txt">0 MPH</div>
                    <div id="lcd-rpm-txt" style="color: #ffaa00; font-size: 8px; margin-top: 4px;">RPM: 0</div>
                </div>
            </div>
        </div>
    </div>

    <!-- UI Overlay Config Panel Layout -->
    <div class="hud-overlay">SPEED: <span id="hud-speed-txt">0</span> MPH</div>

    <div class="ui-menu-layer">
        <button class="toggle-menu-btn" onclick="toggleMenuBox()">Settings</button>
        <div class="customizer-drawer" id="settingsMenu">
            <h3>Bike Customizer</h3>
            
            <span class="option-label">Track Biome</span>
            <div class="btn-row-flex">
