<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>3D Moto Racing Simulator</title> 
    <style> 
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        } 
        body, html { 
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif; 
            background: #0a0a16;
            user-select: none;
        } 
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00d4ff;
            font-size: 1.8em;
            font-weight: bold;
            font-family: monospace;
            text-shadow: 0 0 10px rgba(0,212,255,0.5);
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 8px;
        }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 0.9em;
            color: #aaa;
            line-height: 1.4;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 18px;
            border-radius: 8px;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }
        .settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: auto;
            background: rgba(0, 212, 255, 0.2);
            border: 2px solid #00d4ff;
            color: #00d4ff;
            padding: 10px 25px;
            font-size: 1em;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .settings-btn:hover {
            background: #00d4ff;
            color: #000;
            box-shadow: 0 0 15px #00d4ff;
        }
        .settings-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 380px;
            background: rgba(10, 10, 25, 0.95);
            border: 2px solid #00d4ff;
            border-radius: 15px;
            padding: 25px;
            color: #fff;
            display: none;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.4);
            pointer-events: auto;
        }
        .settings-panel.active {
            display: block;
        }
        .settings-panel h2 {
            text-align: center;
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 1.6em;
        }
        .setting-group {
            margin-bottom: 18px;
        }
        .setting-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 0.85em;
            color: #888;
            text-transform: uppercase;
        }
        .setting-options {
            display: flex;
            gap: 10px;
        }
        .opt-btn {
            flex: 1;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .opt-btn.selected {
            background: rgba(0, 212, 255, 0.25);
            border-color: #00d4ff;
            color: #00d4ff;
        }
        .close-settings {
            width: 100%;
            padding: 12px;
            background: #00d4ff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
    <!-- Dependable Three.js production build bundle asset -->
    <script src="https://cloudflare.com"></script>
</head> 
<body>

    <div id="canvas-container"></div>

    <div class="ui-layer">
        <div class="hud">SPEED: <span id="speedTxt">0</span> MPH</div>
        
        <button class="settings-btn" onclick="toggleSettings()">Settings</button>
        
        <div class="settings-panel" id="settingsPanel">
            <h2>Game Settings</h2>
            
            <div class="setting-group">
                <label>Track Theme</label>
                <div class="setting-options">
                    <button class="opt-btn selected" id="env-dirt" onclick="setTrackTheme('dirt')">Dirt Track</button>
                    <button class="opt-btn" id="env-street" onclick="setTrackTheme('street')">City Street</button>
                </div>
            </div>
            
            <div class="setting-group">
                <label>Bike Customization</label>
                <div class="setting-options">
                    <button class="opt-btn selected" id="col-cyan" onclick="setBikeColor(0x00d4ff, 'cyan')">Cyan</button>
                    <button class="opt-btn" id="col-red" onclick="setBikeColor(0xff3333, 'red')">Red</button>
                    <button class="opt-btn" id="col-yellow" onclick="setBikeColor(0xffcc00, 'yellow')">Yellow</button>
                </div>
            </div>

            <div class="setting-group">
                <label>Wheel Options</label>
                <div class="setting-options">
                    <button class="opt-btn selected" id="wh-normal" onclick="setWheelType(0.5, 'normal')">Stock</button>
                    <button class="opt-btn" id="wh-monster" onclick="setWheelType(0.78, 'monster')">Monster</button>
                </div>
            </div>
            
            <button class="close-settings" onclick="toggleSettings()">Resume Simulation</button>
        </div>

        <div class="controls-hint">
            <strong>Controls:</strong> Hold <strong>W</strong> or <strong>Up Arrow</strong> to accelerate.<br>
            Use <strong>A / D</strong> or <strong>Left / Right Arrows</strong> to turn and lean.<br>
            Press <strong>R</strong> to automatically reset your bike positioning.
        </div>
    </div>

    <script>
        // --- Core Engine Environment Variables ---
        let scene, camera, renderer;
        let bikeGroup, rearWheel, frontWheel, frameMesh, handlebars;
        let trackPlane, trackMaterial;
        let speedIndicators = [];
        let particles = [];
        let isSettingsOpen = false;

        // --- Customization Settings Profiles ---
        let currentTheme = 'dirt';
        let currentBodyColor = 0x00d4ff;
        let currentWheelSize = 0.5;

        // --- Kinematic Motion Variables ---
        let velocity = 0;
        const topSpeed = 1.2;
        const rateOfAcceleration = 0.012;
        const rateOfFriction = 0.96;
        let bikeHeading = 0;
        const rateOfTurning = 0.038;

        // --- Active Key Map Listeners ---
        const activeKeys = { w: false, s: false, a: false, d: false, arrowup: false, arrowdown: false, arrowleft: false, arrowright: false };

        window.addEventListener('keydown', (e) => {
            if (isSettingsOpen) return;
            const keyLow = e.key.toLowerCase();
            if (keyLow === 'r') { resetBikeState(); return; }
            if (activeKeys.hasOwnProperty(keyLow)) activeKeys[keyLow] = true;
        });

        window.addEventListener('keyup', (e) => {
            const keyLow = e.key.toLowerCase();
            if (activeKeys.hasOwnProperty(keyLow)) activeKeys[keyLow] = false;
        });

        // --- Core Application Entry Pipeline ---
        function runSimulation() {
            const stage = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x060613);
            scene.fog = new THREE.FogExp2(0x060613, 0.018);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            stage.appendChild(renderer.domElement);

            // Establish clear ambient and overhead sunlight arrays
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);

            const directSun = new THREE.DirectionalLight(0xffffff, 1.0);
            directSun.position.set(40, 100, 20);
            scene.add(directSun);

            // Construct environmental blocks
            buildTrackEnvironment();
            assembleBikeAsset();
            prepareMotionIndicators();

            window.addEventListener('resize', onResizeWindow);
            
            resetBikeState();
            animateLoop();
        }

        // --- Build Track Environments (Guaranteed High Visibility Mode) ---
        function buildTrackEnvironment() {
            if (trackPlane) scene.remove(trackPlane);

            const trackGeo = new THREE.PlaneGeometry(800, 800, 20, 20);
            trackGeo.rotateX(-Math.PI / 2);

            // Solid clean color definitions to guarantee texturing never fails
            const trackColor = (currentTheme === 'dirt') ? 0x422815 : 0x222228;
            
            trackMaterial = new THREE.MeshStandardMaterial({
                color: trackColor,
