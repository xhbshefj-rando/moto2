<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>3D First Person Moto Pro</title> 
    <style> 
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        } 
        body, html { 
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif; 
            background: #05050f;
            user-select: none;
        } 
        #game-container {
            width: 100%;
            height: 100%;
            position: absolute;
            overflow: hidden;
        }
        /* High-Performance Rendering Surface */
        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        /* 1st Person Cockpit Handlebars Overlay Layer */
        #cockpit-view {
            position: absolute;
            bottom: -10px;
            left: 50%;
            width: 600px;
            height: 320px;
            transform: translateX(-50%);
            pointer-events: none;
            z-index: 500;
            transform-origin: bottom center;
            transition: transform 0.04s linear;
        }
        .handlebar-left {
            position: absolute;
            width: 220px;
            height: 28px;
            background: #1e1e1e;
            border: 4px solid #333;
            left: 10px;
            bottom: 140px;
            transform: rotate(12deg);
            border-radius: 12px 0 0 12px;
            box-shadow: -5px 10px 10px rgba(0,0,0,0.5);
        }
        .handlebar-right {
            position: absolute;
            width: 220px;
            height: 28px;
            background: #1e1e1e;
            border: 4px solid #333;
            right: 10px;
            bottom: 140px;
            transform: rotate(-12deg);
            border-radius: 0 12px 12px 0;
            box-shadow: 5px 10px 10px rgba(0,0,0,0.5);
        }
        .bike-fairing-center {
            position: absolute;
            width: 180px;
            height: 160px;
            background: #00d4ff; /* Custom Trim Variant Paint */
            bottom: 0;
            left: 210px;
            border-radius: 60px 60px 0 0;
            border: 6px solid #1a1a1a;
            box-shadow: 0 -15px 30px rgba(0,0,0,0.7);
            overflow: hidden;
            transition: background 0.3s;
        }
        .digital-dash {
            position: absolute;
            width: 100%;
            height: 65px;
            background: #0f0f15;
            bottom: 0;
            border-top: 4px solid #252530;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #00d4ff;
            font-family: monospace;
            font-weight: bold;
            font-size: 1.1em;
            text-shadow: 0 0 5px #00d4ff;
            line-height: 1.3;
        }
        /* HUD Panel UI */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            pointer-events: none;
        }
        .hud-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00d4ff;
            font-size: 1.8em;
            font-weight: bold;
            font-family: monospace;
            background: rgba(0,0,0,0.8);
            padding: 12px 25px;
            border-radius: 8px;
            border: 1px solid rgba(0,212,255,0.4);
            text-shadow: 0 0 8px rgba(0,212,255,0.6);
        }
        .settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: auto;
            background: rgba(0, 212, 255, 0.2);
            border: 2px solid #00d4ff;
            color: #00d4ff;
            padding: 12px 25px;
            font-size: 1em;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .settings-btn:hover {
            background: #00d4ff;
            color: #000;
            box-shadow: 0 0 15px #00d4ff;
        }
        /* Configuration Panel overlay */
        .settings-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            max-width: 360px;
            background: rgba(10, 10, 20, 0.98);
            border: 2px solid #00d4ff;
            border-radius: 15px;
            padding: 25px;
            color: #fff;
            display: none;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.5);
            pointer-events: auto;
        }
        .settings-panel.active {
            display: block;
        }
        .settings-panel h2 {
            text-align: center;
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 1.4em;
            text-transform: uppercase;
        }
        .setting-group {
            margin-bottom: 18px;
        }
        .setting-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 0.8em;
            color: #888;
            text-transform: uppercase;
        }
        .setting-options {
            display: flex;
            gap: 10px;
        }
        .opt-btn {
            flex: 1;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .opt-btn.selected {
            background: rgba(0, 212, 255, 0.25);
            border-color: #00d4ff;
            color: #00d4ff;
        }
        .close-settings {
            width: 100%;
            padding: 12px;
            background: #00d4ff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
        }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 0.85em;
            color: #aaa;
            line-height: 1.4;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 18px;
            border-radius: 8px;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
    </style>
</head> 
<body>

    <div id="game-container">
        <!-- Unified Vector Projection Canvas -->
        <canvas id="gameCanvas"></canvas>

        <!-- Dynamic Handlebar Cockpit Node -->
        <div id="cockpit-view">
            <div class="handlebar-left" id="l-bar"></div>
            <div class="handlebar-right" id="r-bar"></div>
            <div class="bike-fairing-center" id="b-fairing">
                <div class="digital-dash">
                    <div id="dash-rpm">RPM: 0</div>
                    <div id="dash-gear" style="color: #ff33aa;">GEAR: N</div>
                </div>
            </div>
        </div>
    </div>

    <!-- UI Overlay HUD -->
    <div class="ui-layer">
        <div class="hud-panel">SPEED: <span id="speedTxt">0</span> MPH</div>
        
        <button class="settings-btn" onclick="toggleMenuWindow()">Settings</button>
        
        <div class="settings-panel" id="settingsPanel">
            <h2>Simulator Setup</h2>
            
            <div class="setting-group">
                <label>TRACK TEXTURES THEME</label>
                <div class="setting-options">
                    <button class="opt-btn selected" id="env-dirt" onclick="setBiome('dirt')">Dirt Track</button>
                    <button class="opt-btn" id="env-street" onclick="setBiome('street')">City Street</button>
                </div>
            </div>
            
            <div class="setting-group">
                <label>BIKE FAIRING COLOR</label>
                <div class="setting-options">
                    <button class="opt-btn selected" id="col-cyan" onclick="setFairingPaint('#00d4ff', 'cyan')">Cyan</button>
                    <button class="opt-btn" id="col-red" onclick="setFairingPaint('#ff3333', 'red')">Red</button>
                    <button class="opt-btn" id="col-yellow" onclick="setFairingPaint('#ffcc00', 'yellow')">Yellow</button>
                </div>
            </div>

            <div class="setting-group">
                <label>ENGINE CONFIGURATION</label>
                <div class="setting-options">
                    <button class="opt-btn selected" id="wh-normal" onclick="setEngineTier('normal')">250cc</button>
                    <button class="opt-btn" id="wh-monster" onclick="setEngineTier('monster')">450cc Pro</button>
                </div>
            </div>
            
            <button class="close-settings" onclick="toggleMenuWindow()">Dump Clutch</button>
        </div>

        <div class="controls-hint">
            <strong>Controls:</strong> Hold <strong>W</strong> or <strong>Up Arrow</strong> to apply gas forward.<br>
            Hold <strong>A / D</strong> or <strong>Left / Right Arrows</strong> to turn and physically lean the bike.<br>
            Press <strong>R</strong> to reset your bike positioning immediately.
        </div>
    </div>

    <script>
        // --- Core Environment Properties ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const cockpit = document.getElementById('cockpit-view');
        const fairing = document.getElementById('b-fairing');
