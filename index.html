<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>3D First-Person Motocross Arcade</title> 
    <style> 
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        } 
        body, html { 
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0d0d1a;
            font-family: 'Arial', sans-serif;
            user-select: none;
        } 
        
        /* 3D Core Horizon Viewport */
        #game-viewport {
            width: 100%;
            height: 100%;
            position: absolute;
            overflow: hidden;
            perspective: 350px; /* Forces real hardware 3D depth perspective */
        }

        /* Sky and Horizon background */
        #sky-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 45%;
            background: linear-gradient(to bottom, #020208, #1c112b);
            border-bottom: 3px solid #ffaa00;
        }

        /* 3D Track Ground Plane */
        #track-ground {
            position: absolute;
            bottom: 0;
            left: -100%;
            width: 300%;
            height: 60%;
            background: #4a250b; /* Bright high-contrast racing dirt */
            transform-origin: top center;
            transform: rotateX(70deg);
            box-shadow: inset 0 20px 100px rgba(0,0,0,0.9);
            overflow: hidden;
            transition: background 0.2s;
        }

        /* Bright High-Contrast Speed Lanes (Guarantees visible moving elements) */
        .grid-lane-stripe {
            position: absolute;
            width: 20px;
            height: 160px;
            background: #ffaa00; /* High visibility track guide markers */
            left: 50%;
            top: -160px;
            transform: translateX(-50%);
            box-shadow: 0 0 10px #ffaa00;
        }

        /* Real Dirt Bike Cockpit Overlay Node */
        #bike-cockpit {
            position: absolute;
            bottom: -30px;
            left: 50%;
            width: 620px;
            height: 320px;
            transform: translateX(-50%) rotate(0deg);
            pointer-events: none;
            z-index: 500;
            transform-origin: bottom center;
            transition: transform 0.05s linear;
        }

        /* Realistic Handlebars Architecture Details */
        .metal-handlebars-bar {
            position: absolute;
            width: 540px;
            height: 18px;
            background: #444;
            border: 3px solid #222;
            left: 40px;
            bottom: 120px;
            border-radius: 9px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.6);
        }

        .bar-pad-foam {
            position: absolute;
            width: 160px;
            height: 28px;
            background: #111;
            border: 2px solid #ffaa00;
            left: 230px;
            bottom: 128px;
            border-radius: 6px;
            color: #fff;
            font-family: monospace;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 10px rgba(0,0,0,0.5);
        }

        .rubber-hand-grip-left {
            position: absolute;
            width: 75px;
            height: 28px;
            background: #151515;
            left: 40px;
            bottom: 120px;
            border-radius: 6px 0 0 6px;
            border-left: 6px solid #ffaa00;
            border-right: 3px solid #222;
        }

        .rubber-hand-grip-right {
            position: absolute;
            width: 75px;
            height: 28px;
            background: #151515;
            right: 40px;
            bottom: 120px;
            border-radius: 0 6px 6px 0;
            border-right: 6px solid #ffaa00;
            border-left: 3px solid #222;
        }

        .racing-number-plate {
            position: absolute;
            width: 140px;
            height: 130px;
            background: #ff6600; /* Custom Paint Variant */
            bottom: 0;
            left: 240px;
            border-radius: 40px 40px 10px 10px;
            border: 5px solid #151515;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.7);
            overflow: hidden;
            transition: background 0.3s;
        }

        .lcd-race-dash {
            position: absolute;
            width: 100px;
            height: 40px;
            background: #08080f;
            bottom: 15px;
            left: 15px;
            border-radius: 4px;
            border: 2px solid #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #00ffcc;
            font-family: monospace;
            font-size: 11px;
            font-weight: bold;
            text-shadow: 0 0 5px #00ffcc;
        }

        /* Overlay UI panels configuration styles */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            pointer-events: none;
        }

        .speedometer-hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffaa00;
            font-size: 1.8em;
            font-weight: bold;
            font-family: monospace;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255,170,0,0.4);
            text-shadow: 0 0 10px rgba(255,170,0,0.5);
        }

        .options-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: auto;
            background: rgba(255, 170, 0, 0.2);
            border: 2px solid #ffaa00;
            color: #ffaa00;
            padding: 10px 20px;
            font-size: 0.9em;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .options-btn:hover {
            background: #ffaa00;
            color: #000;
            box-shadow: 0 0 15px #ffaa00;
        }

        .menu-overlay-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 350px;
            background: rgba(10, 10, 20, 0.98);
            border: 2px solid #ffaa00;
            border-radius: 12px;
            padding: 25px;
            color: #fff;
            display: none;
            box-shadow: 0 0 40px rgba(255, 170, 0, 0.5);
            pointer-events: auto;
        }

        .menu-overlay-panel.active {
            display: block;
        }

        .menu-overlay-panel h3 {
            text-align: center;
            color: #ffaa00;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-size: 1.3em;
        }

        .config-row {
            margin-bottom: 15px;
        }

        .config-row label {
            display: block;
            font-size: 0.75em;
            color: #aaa;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .opt-flex {
            display: flex;
            gap: 5px;
        }

        .selection-btn {
            flex: 1;
            padding: 10px 4px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: bold;
            text-align: center;
        }

        .selection-btn.selected {
            background: rgba(255, 170, 0, 0.25);
            border-color: #ffaa00;
            color: #ffaa00;
        }

        .close-panel-btn {
            width: 100%;
            padding: 12px;
            background: #ffaa00;
            color: #000;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
        }

        .hint-card {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85em;
            background: rgba(0,0,0,0.8);
            padding: 10px 15px;
            border-radius: 6px;
            pointer-events: none;
            line-height: 1.4;
            border: 1px solid rgba(255, 170, 0, 0.2);
        }
    </style>
</head> 
<body>

    <!-- 100% Safe Native CSS Element Viewport (Zero Drawing Scripts Needed to Load Scene Layouts) -->
    <div id="game-viewport">
        <div id="sky-bg"></div>
        <div id="track-ground">
            <!-- Continuous Lane Guidelines built programmatically inside loop blocks below -->
        </div>
        
        <!-- Hardware Textured Pro Motocross Handlebar Cockpit -->
        <div id="bike-cockpit">
            <div class="metal-handlebars-bar"></div>
            <div class="rubber-hand-grip-left"></div>
            <div class="rubber-hand-grip-right"></div>
            <div class="bar-pad-foam">PRO GRAPHICS 3D</div>
            
            <div class="racing-number-plate" id="bike-plate">
                <div class="lcd-race-dash">
                    <div id="dash-mph">0 MPH</div>
                    <div id="dash-rpm" style="color: #ffaa00; font-size: 8px; margin-top: 4px;">RPM: 0</div>
                </div>
            </div>
        </div>
    </div>

    <!-- UI Overlay Panels Framework -->
    <div class="ui-layer">
