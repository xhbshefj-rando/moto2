<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>3D Pro Motocross Simulator</title> 
    <style> 
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        } 
        body, html { 
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #050510;
            font-family: 'Arial', sans-serif;
            user-select: none;
        } 
        #game-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        /* Top Right Option Layer Panel UI */
        .ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        .settings-btn {
            background: rgba(255, 150, 0, 0.2);
            border: 2px solid #ff9600;
            color: #ff9600;
            padding: 10px 20px;
            font-size: 0.9em;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            pointer-events: auto;
        }
        .settings-btn:hover {
            background: #ff9600;
            color: #000;
            box-shadow: 0 0 15px #ff9600;
        }
        .menu-box {
            position: absolute;
            top: 50px;
            right: 0;
            width: 280px;
            background: rgba(10, 10, 20, 0.96);
            border: 2px solid #ff9600;
            border-radius: 10px;
            padding: 20px;
            color: #fff;
            display: none;
            box-shadow: 0 0 30px rgba(255, 150, 0, 0.4);
            pointer-events: auto;
        }
        .menu-box.active {
            display: block;
        }
        .menu-box h3 {
            text-align: center;
            color: #ff9600;
            margin-bottom: 15px;
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-group {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }
        .opt-btn {
            flex: 1;
            padding: 8px 4px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: bold;
            text-align: center;
            transition: all 0.15s;
        }
        .opt-btn:hover {
            border-color: #ff9600;
        }
        .opt-btn.selected {
            background: rgba(255, 150, 0, 0.25);
            border-color: #ff9600;
            color: #ff9600;
        }
        .hint-text {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85em;
            background: rgba(0,0,0,0.75);
            padding: 10px 15px;
            border-radius: 6px;
            pointer-events: none;
            line-height: 1.5;
            border: 1px solid rgba(255, 150, 0, 0.2);
            z-index: 1000;
        }
    </style>
</head> 
<body>

    <div id="game-container">
        <!-- Unified Rendering Canvas Surface Layer -->
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- UI Overlay Config Panel Layout -->
    <div class="ui-panel">
        <button class="settings-btn" onclick="toggleMenuWindow()">Settings</button>
        <div class="menu-box" id="settingsMenu">
            <h3>Bike Configuration</h3>
            
            <div style="margin-bottom: 10px;">
                <label style="display:block; font-size:0.75em; color:#aaa; margin-bottom:4px; font-weight:bold;">TRACK THEME</label>
                <div class="btn-group">
                    <button class="opt-btn selected" id="env-dirt" onclick="setBiome('dirt')">Red Clay</button>
                    <button class="opt-btn" id="env-street" onclick="setBiome('street')">Supercross</button>
                </div>
            </div>

            <div style="margin-bottom: 10px;">
                <label style="display:block; font-size:0.75em; color:#aaa; margin-bottom:4px; font-weight:bold;">FAIRING GRAPHICS</label>
                <div class="btn-group">
                    <button class="opt-btn selected" id="col-orange" onclick="setPaintColor('#ff5500', 'orange')">Orange</button>
                    <button class="opt-btn" id="col-green" onclick="setPaintColor('#22cc22', 'green')">Green</button>
                    <button class="opt-btn" id="col-blue" onclick="setPaintColor('#0066ff', 'blue')">Blue</button>
                </div>
            </div>

            <div>
                <label style="display:block; font-size:0.75em; color:#aaa; margin-bottom:4px; font-weight:bold;">ENGINE TIERS</label>
                <div class="btn-group">
                    <button class="opt-btn selected" id="pow-250" onclick="setEngineClass('normal')">250cc</button>
                    <button class="opt-btn" id="pow-450" onclick="setEngineClass('monster')">450cc Pro</button>
                </div>
            </div>
        </div>
    </div>

    <div class="hint-text">
        <strong>Controls:</strong> Hold <strong>W</strong> or <strong>Up Arrow</strong> to apply engine gas throttle.<br>
        Hold <strong>A / D</strong> or <strong>Left / Right Arrows</strong> to steer and physically lean the bars.<br>
        Press <strong>R</strong> to reset track velocity positions back to default.
    </div>

    <script>
        // --- Core Setup Elements ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let isMenuOpen = false;
        let activeBiome = 'dirt';
        let engineClass = 'normal';
        let fairingColor = '#ff5500'; // Default Racing KTM Orange Plastic

        // --- Core Simulator Kinematics States variables ---
        let speedVelocity = 0;
        let topSpeedLimit = 25;
        let distanceTraveled = 0;
        let lateralPositionOffset = 0; // Left/Right path placement displacement tracking
        let trackCurveWeight = 0;

        // --- Advanced Lean Interpolators Math ---
        let targetLeanAngle = 0;
        let currentLeanLerp = 0;

        // --- Key Control Tracker Arrays Mappings ---
        const activeKeys = { w: false, s: false, a: false, d: false, arrowup: false, arrowdown: false, arrowleft: false, arrowright: false };

        window.addEventListener('keydown', (e) => {
            if (isMenuOpen) return;
            const k = e.key.toLowerCase();
            if (k === 'r') { resetSimulationState(); return; }
            if (activeKeys.hasOwnProperty(k)) activeKeys[k] = true;
        });

        window.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (activeKeys.hasOwnProperty(k)) activeKeys[k] = false;
        });

        function stretchCanvasToMonitorSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', stretchCanvasToMonitorSize);

        // --- Core Engine Vector Processing Frames Pipeline Loop ---
        function runGraphicsCycle() {
            requestAnimationFrame(runGraphicsCycle);

            // Extract control bindings states
            const throttle = activeKeys.w || activeKeys.arrowup;
            const brakes = activeKeys.s || activeKeys.arrowdown;
            const left = activeKeys.a || activeKeys.arrowleft;
            const right = activeKeys.d || activeKeys.arrowright;

            // 1. Dynamic Physics Accelerations
            if (!isMenuOpen) {
                const stepAcceleration = (engineClass === 'monster') ? 0.38 : 0.22;
                if (throttle) {
                    speedVelocity = Math.min(speedVelocity + stepAcceleration, topSpeedLimit);
                } else if (brakes) {
                    speedVelocity = Math.max(speedVelocity - 0.7, 0);
                } else {
                    speedVelocity *= 0.95; // Mechanical engine exhaust backpressure drag drops
                }

                distanceTraveled += speedVelocity;

                // Continuous trigonometry updates generate curving roads layouts ahead
                trackCurveWeight = Math.sin(distanceTraveled * 0.001) * 2.5 + Math.cos(distanceTraveled * 0.0004) * 1.5;

                // 2. Pro Cockpit Turning & Leaning Calculus
                targetLeanAngle = 0;
                if (left && speedVelocity > 0.5) {
                    lateralPositionOffset -= speedVelocity * 0.15;
                    targetLeanAngle = -24; // Handlebar lean limits matrix angle rotation
                } else if (right && speedVelocity > 0.5) {
                    lateralPositionOffset += speedVelocity * 0.15;
                    targetLeanAngle = 24;
                }

                // Centrifugal Gravity Drift (Curving paths drag your track alignment outwards)
                lateralPositionOffset -= (trackCurveWeight * speedVelocity * 0.045);

                // Safe boundaries crash penalty locks
                if (lateralPositionOffset < -110 || lateralPositionOffset > 110) {
                    speedVelocity = Math.max(speedVelocity - 0.5, 3.5);
                }
            }

            // Smoothly linear-interpolate steering balance lean offsets (Kills shaking artifacts)
            currentLeanLerp = currentLeanLerp * 0.82 + targetLeanAngle * 0.18;

            // Generate high RPM motor vibrations tremors
            let tremorX = 0, tremorY = 0;
            if (speedVelocity > 1 && !isMenuOpen) {
