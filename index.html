<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>3D Pro Motocross Simulator - Bulletproof Edition</title> 
    <style> 
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        } 
        body, html { 
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #090916;
            font-family: 'Arial', sans-serif;
            user-select: none;
        } 
        
        /* 3D Core Viewport Engine - Works on any browser size */
        #simulator-viewport {
            width: 100%;
            height: 100%;
            position: absolute;
            overflow: hidden;
            perspective: 300px; /* Hardware-enforced 3D perspective mapping */
        }

        /* High-Contrast Skyline Sky Layer */
        #skybox {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 45%;
            background: linear-gradient(to bottom, #03030b, #1d122e);
            border-bottom: 4px solid #ff7700;
            transition: background 0.3s, border-color 0.3s;
        }

        /* Real-time Simulated 3D Track Ground Layer */
        #ground-plane {
            position: absolute;
            bottom: 0;
            left: -100%;
            width: 300%;
            height: 60%;
            background: #4a2306; /* Default Factory Clay Dirt */
            transform-origin: top center;
            transform: rotateX(72deg);
            box-shadow: inset 0 20px 100px rgba(0,0,0,0.9);
            overflow: hidden;
            transition: background 0.3s;
        }

        /* High-Contrast Velocity Stripes (Guarantees visible road motion elements) */
        .velocity-lane-stripe {
            position: absolute;
            width: 30px;
            height: 180px;
            background: #ffaa00; /* High visibility contrast lane strips */
            left: 50%;
            top: -180px;
            transform: translateX(-50%);
            box-shadow: 0 0 15px #ffaa00;
        }

        /* Hand-Crafted First-Person Pro Dirt Bike Cockpit Overlay Assembly Node */
        #moto-cockpit {
            position: absolute;
            bottom: -20px;
            left: 50%;
            width: 600px;
            height: 320px;
            transform: translateX(-50%) rotate(0deg);
            pointer-events: none;
            z-index: 500;
            transform-origin: bottom center;
            transition: transform 0.04s linear;
        }

        /* Solid SVG Vector Render Elements for Handlebars Tubes */
        .alloy-handlebar-core {
            position: absolute;
            width: 520px;
            height: 16px;
            background: #333;
            border: 3px solid #1a1a1a;
            left: 40px;
            bottom: 110px;
            border-radius: 8px;
            box-shadow: 0 8px 12px rgba(0,0,0,0.6);
        }

        .protective-foam-pad {
            position: absolute;
            width: 150px;
            height: 26px;
            background: #0a0a0a;
            border: 2px solid #ff7700;
            left: 225px;
            bottom: 118px;
            border-radius: 5px;
            color: #fff;
            font-family: monospace;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            transition: border-color 0.3s;
        }

        .rubber-handgrip-l {
            position: absolute;
            width: 70px;
            height: 26px;
            background: #111;
            left: 40px;
            bottom: 110px;
            border-radius: 5px 0 0 5px;
            border-left: 6px solid #ff7700;
            border-right: 2px solid #222;
            transition: border-color 0.3s;
        }

        .rubber-handgrip-r {
            position: absolute;
            width: 70px;
            height: 26px;
            background: #111;
            right: 40px;
            bottom: 110px;
            border-radius: 0 5px 5px 0;
            border-right: 6px solid #ff7700;
            border-left: 2px solid #222;
            transition: border-color 0.3s;
        }

        /* Factory Plastics front Number Plate Fairing Trim Board */
        .plastics-number-plate {
            position: absolute;
            width: 140px;
            height: 130px;
            background: #ff5500; /* Default Racing KTM Orange Plastic */
            bottom: 0;
            left: 230px;
            border-radius: 40px 40px 10px 10px;
            border: 5px solid #111;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.7);
            overflow: hidden;
            transition: background 0.2s;
        }

        /* Solid-State Backlit LCD Race Dash Gauges panel */
        .lcd-dashboard-screen {
            position: absolute;
            width: 100px;
            height: 42px;
            background: #04040a;
            bottom: 15px;
            left: 15px;
            border-radius: 4px;
            border: 2px solid #252530;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #00ffcc;
            font-family: monospace;
            font-size: 11px;
            font-weight: bold;
            text-shadow: 0 0 5px #00ffcc;
            line-height: 1.3;
        }

        /* UI Overlays Hud Layer panels */
        .ui-layer-hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            pointer-events: none;
        }

        .speedometer-card {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffaa00;
            font-size: 1.8em;
            font-weight: bold;
            font-family: monospace;
            background: rgba(0,0,0,0.85);
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid #ffaa00;
            text-shadow: 0 0 10px rgba(255,170,0,0.5);
        }

        .options-btn-frame {
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: auto;
            background: rgba(255, 170, 0, 0.2);
            border: 2px solid #ffaa00;
            color: #ffaa00;
            padding: 10px 20px;
            font-size: 0.9em;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .options-btn-frame:hover {
            background: #ffaa00;
            color: #000;
            box-shadow: 0 0 15px #ffaa00;
        }

        /* Setup customizer menu overlay box drawer */
        .menu-overlay-drawer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 350px;
            background: rgba(8, 8, 18, 0.98);
            border: 2px solid #ffaa00;
            border-radius: 12px;
            padding: 25px;
            color: #fff;
            display: none;
            box-shadow: 0 0 40px rgba(255, 170, 0, 0.6);
            pointer-events: auto;
        }

        .menu-overlay-drawer.active {
            display: block;
        }

        .menu-overlay-drawer h3 {
            text-align: center;
            color: #ffaa00;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-size: 1.3em;
            letter-spacing: 1px;
        }

        .config-block-row {
            margin-bottom: 16px;
        }

        .config-block-row label {
            display: block;
            font-size: 0.75em;
            color: #888;
            margin-bottom: 6px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn-flex-grid {
            display: flex;
            gap: 5px;
        }

        .customizer-opt-btn {
            flex: 1;
            padding: 10px 4px;
            background: rgba(255,255,255,0.04);
            border: 1px solid #3c3c4a;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: bold;
            text-align: center;
            transition: all 0.15s;
        }

        .customizer-opt-btn.selected {
            background: rgba(255, 170, 0, 0.25);
            border-color: #ffaa00;
            color: #ffaa00;
        }

        .resume-btn-action {
            width: 100%;
            padding: 12px;
            background: #ffaa00;
            color: #000;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
        }

        .hud-hint-box {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85em;
            background: rgba(0,0,0,0.85);
            padding: 10px 15px;
            border-radius: 6px;
            pointer-events: none;
            line-height: 1.4;
            border: 1px solid rgba(255, 170, 0, 0.2);
        }
    </style>
</head> 
<body>

    <!-- 100% Solid Native DOM Object Layout Architecture -->
    <div id="simulator-viewport">
        <div id="skybox"></div>
        <div id="ground-plane">
            <!-- High visibility lane guide stripes populate inside loop blocks securely below -->
        </div>
        
        <!-- Hardware-Linked 1st-Person Motorcycle Dashboard Assembly -->
        <div id="moto-cockpit">
