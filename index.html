<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>3D First-Person Pro Motocross</title> 
    <style> 
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        } 
        body, html { 
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0d0d1a;
            font-family: 'Arial', sans-serif;
            user-select: none;
        } 
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        /* Config Overlay Panel */
        .ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        .settings-btn {
            background: rgba(255, 170, 0, 0.2);
            border: 2px solid #ffaa00;
            color: #ffaa00;
            padding: 10px 20px;
            font-size: 0.9em;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .settings-btn:hover {
            background: #ffaa00;
            color: #000;
            box-shadow: 0 0 15px #ffaa00;
        }
        .menu-box {
            position: absolute;
            top: 50px;
            right: 0;
            width: 280px;
            background: rgba(15, 15, 25, 0.98);
            border: 2px solid #ffaa00;
            border-radius: 10px;
            padding: 20px;
            color: #fff;
            display: none;
            box-shadow: 0 0 30px rgba(255, 170, 0, 0.4);
        }
        .menu-box.active {
            display: block;
        }
        .menu-box h3 {
            text-align: center;
            color: #ffaa00;
            margin-bottom: 15px;
            font-size: 1.2em;
            text-transform: uppercase;
        }
        .btn-group {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }
        .opt-btn {
            flex: 1;
            padding: 8px 4px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: bold;
            text-align: center;
        }
        .opt-btn.selected {
            background: rgba(255, 170, 0, 0.25);
            border-color: #ffaa00;
            color: #ffaa00;
        }
        .hint-text {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85em;
            background: rgba(0,0,0,0.75);
            padding: 10px 15px;
            border-radius: 6px;
            pointer-events: none;
            line-height: 1.5;
            border: 1px solid rgba(255, 170, 0, 0.2);
        }
    </style>
</head> 
<body>

    <div id="canvas-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- UI Overlay Config -->
    <div class="ui-panel">
        <button class="settings-btn" onclick="toggleMenu()">Bike Setup</button>
        <div class="menu-box" id="settingsMenu">
            <h3>Bike Customizer</h3>
            
            <div style="margin-bottom: 10px;">
                <label style="display:block; font-size:0.75em; color:#aaa; margin-bottom:4px; font-weight:bold;">TRACK BIOME</label>
                <div class="btn-group">
                    <button class="opt-btn selected" id="env-dirt" onclick="setBiome('dirt')">Red Clay</button>
                    <button class="opt-btn" id="env-street" onclick="setBiome('street')">Supercross</button>
                </div>
            </div>

            <div style="margin-bottom: 10px;">
                <label style="display:block; font-size:0.75em; color:#aaa; margin-bottom:4px; font-weight:bold;">FAIRING GRAPHICS</label>
                <div class="btn-group">
                    <button class="opt-btn selected" id="col-orange" onclick="setColor('#ff6600', 'orange')">Orange</button>
                    <button class="opt-btn" id="col-green" onclick="setColor('#33cc33', 'green')">Green</button>
                    <button class="opt-btn" id="col-blue" onclick="setColor('#0066ff', 'blue')">Blue</button>
                </div>
            </div>

            <div>
                <label style="display:block; font-size:0.75em; color:#aaa; margin-bottom:4px; font-weight:bold;">ENGINE TIER</label>
                <div class="btn-group">
                    <button class="opt-btn selected" id="pow-250" onclick="setEngine('normal')">250cc 4-Stroke</button>
                    <button class="opt-btn" id="pow-450" onclick="setEngine('monster')">450cc Factory</button>
                </div>
            </div>
        </div>
    </div>

    <div class="hint-text">
        <strong>Controls:</strong> Hold <strong>W</strong> or <strong>Up Arrow</strong> to roll on the throttle.<br>
        Hold <strong>A / D</strong> or <strong>Left / Right Arrows</strong> to turn and lean deep into curves.<br>
        Press <strong>R</strong> to reset your bike positioning immediately.
    </div>

    <script>
        // --- Core Setup Elements ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let isMenuOpen = false;
        let biomeType = 'dirt';
        let bikeClass = 'normal';
        let fairingColor = '#ff6600'; // Default Factory Racing Orange

        // --- Physics & Track Generation state variables ---
        let speed = 0;
        let topSpeed = 24;
        let distanceTraveled = 0;
        let lateralOffset = 0; 
        let trackCurve = 0;
        
        // --- Leaning Interpolators ---
        let targetLeanAngle = 0;
        let interpolatedLean = 0;

        // --- Unified Keyboard Input Array ---
        const inputs = { w: false, s: false, a: false, d: false, arrowup: false, arrowdown: false, arrowleft: false, arrowright: false };

        window.addEventListener('keydown', (e) => {
            if (isMenuOpen) return;
            const key = e.key.toLowerCase();
            if (key === 'r') { resetState(); return; }
            if (inputs.hasOwnProperty(key)) inputs[key] = true;
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (inputs.hasOwnProperty(key)) inputs[key] = false;
        });

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        // --- Graphics & Physics Processing Loop Engine ---
        function renderLoop() {
            requestAnimationFrame(renderLoop);

            if (isMenuOpen) return;

            // Handle Input Processing
            const gas = inputs.w || inputs.arrowup;
            const brake = inputs.s || inputs.arrowdown;
            const turnLeft = inputs.a || inputs.arrowleft;
            const turnRight = inputs.d || inputs.arrowright;

            // 1. Motocross Physics & Power Vectors
            const throttlePower = (bikeClass === 'monster') ? 0.40 : 0.24;
            if (gas) {
                speed = Math.min(speed + throttlePower, topSpeed);
            } else if (brake) {
                speed = Math.max(speed - 0.7, 0);
            } else {
                speed *= 0.95; // Mechanical engine-braking friction drag drop
            }

            distanceTraveled += speed;

            // Continuous complex curve wave math to build an organic track layout
            trackCurve = Math.sin(distanceTraveled * 0.001) * 2.6 + Math.cos(distanceTraveled * 0.0004) * 1.6;

            // 2. Pro Cockpit Lean Simulation Math
            targetLeanAngle = 0;
            if (turnLeft && speed > 0.5) {
                lateralOffset -= speed * 0.16;
                targetLeanAngle = -26; // Complete 26-degree handlebar layout pivot slant
            } else if (turnRight && speed > 0.5) {
                lateralOffset += speed * 0.16;
                targetLeanAngle = 26;
            }

            // Continuous drift (Track curves drag your alignment sideways)
            lateralOffset -= (trackCurve * speed * 0.045);

            // Interpolate leaning angles smoothly (Eliminates jarring frame skips)
            interpolatedLean = interpolatedLean * 0.82 + targetLeanAngle * 0.18;

            // Handle bar vibrations relative to engine speed
            let vibeX = 0, vibeY = 0;
            if (speed > 1) {
                const shakeRatio = (speed / topSpeed);
                vibeX = (Math.random() - 0.5) * (14 * shakeRatio);
                vibeY = (Math.random() - 0.5) * (8 * shakeRatio);
            }

            // --- DRAWING PIPELINE ---
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const horizonHeightY = canvas.height * 0.45; // Lower horizon for enhanced 3D depth

            // A. Render Sky Background Gradient
            const skyGrad = ctx.createLinearGradient(0, 0, 0, horizonHeightY);
            if (biomeType === 'dirt') {
                skyGrad.addColorStop(0, '#040201'); skyGrad.addColorStop(1, '#24140a'); // Sunset desert sky
            } else {
                skyGrad.addColorStop(0, '#010408'); skyGrad.addColorStop(1, '#0e1a2b'); // Night arena sky
            }
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, horizonHeightY);

            // Draw Mountain Ranges Background
