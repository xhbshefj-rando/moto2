<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>MX Bikes - Web Simulator Edition</title> 
    <style> 
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        } 
        body, html { 
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #05050d;
            font-family: 'Arial', sans-serif;
            user-select: none;
        } 
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        /* Dashboard Customizer Panel */
        .ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        .settings-btn {
            background: rgba(25ages, 160, 0, 0.2);
            background: rgba(255, 102, 0, 0.2);
            border: 2px solid #ff5500;
            color: #ff5500;
            padding: 10px 20px;
            font-size: 0.85em;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .settings-btn:hover {
            background: #ff5500;
            color: #000;
            box-shadow: 0 0 15px #ff5500;
        }
        .menu-box {
            position: absolute;
            top: 50px;
            right: 0;
            width: 260px;
            background: rgba(10, 10, 15, 0.98);
            border: 2px solid #ff5500;
            border-radius: 8px;
            padding: 20px;
            color: #fff;
            display: none;
            box-shadow: 0 0 25px rgba(ff, 85, 0, 0.4);
        }
        .menu-box.active {
            display: block;
        }
        .menu-box h3 {
            text-align: center;
            color: #ff5500;
            margin-bottom: 15px;
            font-size: 1.1em;
            text-transform: uppercase;
        }
        .btn-group {
            display: flex;
            gap: 5px;
            margin-bottom: 12px;
        }
        .opt-btn {
            flex: 1;
            padding: 8px 2px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75em;
            font-weight: bold;
            text-align: center;
        }
        .opt-btn.selected {
            background: rgba(255, 85, 0, 0.25);
            border-color: #ff5500;
            color: #ff5500;
        }
        .hint-text {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8em;
            background: rgba(0,0,0,0.8);
            padding: 10px 15px;
            border-radius: 6px;
            pointer-events: none;
            line-height: 1.4;
            border: 1px solid rgba(255, 85, 0, 0.2);
        }
    </style>
</head> 
<body>

    <div id="canvas-container">
        <!-- Single Canvas Architecture ensures zero layout rendering failures -->
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="ui-panel">
        <button class="settings-btn" onclick="toggleSettingsMenu()">Bike Settings</button>
        <div class="menu-box" id="settingsMenu">
            <h3>Garage Setup</h3>
            
            <div style="margin-bottom: 8px;">
                <label style="display:block; font-size:0.7em; color:#aaa; margin-bottom:4px; font-weight:bold;">TRACK BIOME</label>
                <div class="btn-group">
                    <button class="opt-btn selected" id="env-dirt" onclick="changeTrackTheme('dirt')">Red Clay</button>
                    <button class="opt-btn" id="env-street" onclick="changeTrackTheme('street')">Supercross</button>
                </div>
            </div>

            <div style="margin-bottom: 8px;">
                <label style="display:block; font-size:0.7em; color:#aaa; margin-bottom:4px; font-weight:bold;">PLASTICS COLOR</label>
                <div class="btn-group">
                    <button class="opt-btn selected" id="col-orange" onclick="changeBikeColor('#ff5500', 'orange')">Orange</button>
                    <button class="opt-btn" id="col-green" onclick="changeBikeColor('#33cc33', 'green')">Green</button>
                    <button class="opt-btn" id="col-blue" onclick="changeBikeColor('#0066ff', 'blue')">Blue</button>
                </div>
            </div>

            <div>
                <label style="display:block; font-size:0.7em; color:#aaa; margin-bottom:4px; font-weight:bold;">ENGINE POWER</label>
                <div class="btn-group">
                    <button class="opt-btn selected" id="pow-250" onclick="changeEngineClass('normal')">250cc 4T</button>
                    <button class="opt-btn" id="pow-450" onclick="changeEngineClass('monster')">450cc Factory</button>
                </div>
            </div>
        </div>
    </div>

    <div class="hint-text">
        <strong>MX Bikes Controls:</strong> Hold <strong>W</strong> or <strong>Up Arrow</strong> to roll on throttle.<br>
        Hold <strong>A / D</strong> or <strong>Left / Right Arrows</strong> to steer and lean your rider geometry.<br>
        Press <strong>R</strong> to recalibrate track positions immediately back to the center line.
    </div>

    <script>
        // --- Core Framework Anchors ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let isSettingsOpen = false;
        let activeTheme = 'dirt';
        let engineClass = 'normal';
        let bikeColor = '#ff5500'; // Default Factory MX Orange

        // --- Core Simulator Kinematics States ---
        let rawSpeed = 0;
        let topSpeedLimit = 22;
        let totalDistanceCovered = 0;
        let trackLateralOffset = 0; // Rider position relative to track center line
        let ongoingRoadCurve = 0;
        
        // --- Interpolated Lean Angle Aggregators ---
        let targetLean = 0;
        let currentLeanLerp = 0;

        // --- Keyboard Controls Framework Mapping ---
        const controlKeys = { w: false, s: false, a: false, d: false, arrowup: false, arrowdown: false, arrowleft: false, arrowright: false };

        window.addEventListener('keydown', (e) => {
            if (isSettingsOpen) return;
            const keyNormalized = e.key.toLowerCase();
            if (keyNormalized === 'r') { clearSimulationData(); return; }
            if (controlKeys.hasOwnProperty(keyNormalized)) controlKeys[keyNormalized] = true;
        });

        window.addEventListener('keyup', (e) => {
            const keyNormalized = e.key.toLowerCase();
            if (controlKeys.hasOwnProperty(keyNormalized)) controlKeys[keyNormalized] = false;
        });

        function adjustCanvasScaling() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', adjustCanvasScaling);

        // --- Core Graphics Rendering & Physics Frame Tick Loop ---
        function executeSimulationTick() {
            requestAnimationFrame(executeSimulationTick);

            if (isSettingsOpen) return;

            // Extract User Controls Mapping Flags
            const inputThrottle = controlKeys.w || controlKeys.arrowup;
            const inputBrake = controlKeys.s || controlKeys.arrowdown;
            const inputLeft = controlKeys.a || controlKeys.arrowleft;
            const inputRight = controlKeys.d || controlKeys.arrowright;

            // 1. Process Advanced MX Acceleration Physics Equations
            const bikePowerCoefficient = (engineClass === 'monster') ? 0.38 : 0.22;
            if (inputThrottle) {
                rawSpeed = Math.min(rawSpeed + bikePowerCoefficient, topSpeedLimit);
            } else if (inputBrake) {
                rawSpeed = Math.max(rawSpeed - 0.7, 0);
            } else {
                rawSpeed *= 0.95; // Atmospheric engine backpressure air friction drag drop
            }

            totalDistanceCovered += rawSpeed;

            // Generate organic winding curves based on absolute distance traveled
            ongoingRoadCurve = Math.sin(totalDistanceCovered * 0.001) * 2.5 + Math.cos(totalDistanceCovered * 0.0004) * 1.5;

            // 2. Pro Cockpit Lean Simulation Logic
            targetLean = 0;
            if (inputLeft && rawSpeed > 0.5) {
                trackLateralOffset -= rawSpeed * 0.15;
                targetLean = -24; // Handlebar lean limits matrix angle rotation
            } else if (inputRight && rawSpeed > 0.5) {
                trackLateralOffset += rawSpeed * 0.15;
                targetLean = 24;
            }

            // Centrifugal Balance Drift (Track curves slide bike coordinates outwards)
            trackLateralOffset -= (ongoingRoadCurve * rawSpeed * 0.045);

            // Handle road shoulder friction boundary rules slowdowns
            if (trackLateralOffset < -110 || trackLateralOffset > 110) {
                rawSpeed = Math.max(rawSpeed - 0.5, 3.5);
            }

            // Interpolate leaning angles smoothly (Clears visual shaking artifacts)
            currentLeanLerp = currentLeanLerp * 0.82 + targetLean * 0.18;

            // High throttle engine motor vibration loops simulation variables
            let tremorWeightX = 0, tremorWeightY = 0;
            if (rawSpeed > 1) {
                const ratio = (rawSpeed / topSpeedLimit);
                tremorWeightX = (Math.random() - 0.5) * (14 * ratio);
                tremorWeightY = (Math.random() - 0.5) * (8 * ratio);
            }
