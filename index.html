<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Browser Motocross</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        h1 { margin: 0 0 5px 0; font-size: 24px; }
        p { margin: 5px 0; font-size: 14px; }
        .controls { margin-top: 15px; font-size: 12px; opacity: 0.8; }
    </style>
    <!-- Include Three.js via CDN -->
    <script src="https://cloudflare.com"></script>
</head>
<body>
    <div id="ui">
        <h1>3D MOTO SIM</h1>
        <p>Speed: <span id="speed">0</span> km/h</p>
        <p>Airtime: <span id="airtime">0.0</span>s</p>
        <div class="controls">
            <b>W / S</b> : Throttle / Brake<br>
            <b>A / D</b> : Steering<br>
            <b>Arrow Up / Down</b> : Lean Forward / Back (Pitch)
        </div>
    </div>
    <div id="canvas-container"></div>

    <script>
        // --- GAME STATE & PHYSICS CONSTANTS ---
        const bike = {
            x: 0, y: 5, z: 0,
            vx: 0, vy: 0, vz: 0,
            speed: 0,
            heading: 0,
            pitch: 0,
            roll: 0,
            isGrounded: false,
            airTime: 0
        };

        const CONTROLS = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false };
        const GRAVITY = 0.25;
        const ACCELERATION = 0.15;
        const MAX_SPEED = 1.2;
        const FRICTION = 0.02;
        const TRACK_SIZE = 1000;

        // --- SETUP THREE.JS SCENE ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.005);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xfffaed, 0.8);
        dirLight.position.set(100, 300, 100);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        // --- GENERATE PERLIN-LIKE TRACK TERRAIN ---
        const geometry = new THREE.PlaneGeometry(TRACK_SIZE, TRACK_SIZE, 120, 120);
        geometry.rotateX(-Math.PI / 2); // Make it horizontal

        const pos = geometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            let x = pos.getX(i);
            let z = pos.getZ(i);
            
            // Create modular tracks: valleys, massive jump ramps, and whoops
            let height = Math.sin(x * 0.02) * Math.cos(z * 0.02) * 15; // Rolling hills
            height += Math.sin(z * 0.1) * 2; // Rhythmic whoops sections
            
            // Add specific massive jump tables
            if (Math.abs(x) < 40 && z > 50 && z < 150) {
                height += Math.sin((z - 50) * Math.PI / 100) * 18;
            }
            if (Math.abs(z) < 40 && x > -200 && x = 120 || row < 0 || row >= 120) return 0;
            
            // Direct vertex lookup calculation for speed performance
            const index = (row * 121) + col;
            if (geometry.attributes.position.getY(index)) {
                return geometry.attributes.position.getY(index);
            }
            return 0;
        }

        // --- INPUT DETECTORS ---
        window.addEventListener('keydown', (e) => { if(e.key in CONTROLS) CONTROLS[e.key] = true; });
        window.addEventListener('keyup', (e) => { if(e.key in CONTROLS) CONTROLS[e.key] = false; });
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- UI TEXT COUNTERS ---
        const speedText = document.getElementById('speed');
        const airtimeText = document.getElementById('airtime');

        // --- MAIN GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. Handle Steering & Lean Input
            if (CONTROLS.a) {
                if (bike.isGrounded) bike.heading += 0.03 * (bike.speed / MAX_SPEED + 0.2);
                bike.roll = THREE.MathUtils.lerp(bike.roll, 0.4, 0.1);
            } else if (CONTROLS.d) {
                if (bike.isGrounded) bike.heading -= 0.03 * (bike.speed / MAX_SPEED + 0.2);
                bike.roll = THREE.MathUtils.lerp(bike.roll, -0.4, 0.1);
            } else {
                bike.roll = THREE.MathUtils.lerp(bike.roll, 0, 0.1);
            }

            // Air Control Pitching (Lean Forward / Back)
            if (!bike.isGrounded) {
                if (CONTROLS.ArrowUp) bike.pitch -= 0.04;
                if (CONTROLS.ArrowDown) bike.pitch += 0.04;
            }

            // 2. Handle Throttle & Braking
            if (CONTROLS.w) {
                bike.speed = Math.min(bike.speed + ACCELERATION, MAX_SPEED);
            } else if (CONTROLS.s) {
                bike.speed = Math.max(bike.speed - ACCELERATION * 1.5, -MAX_SPEED * 0.3);
            } else {
                bike.speed = THREE.MathUtils.lerp(bike.speed, 0, FRICTION);
            }

            // 3. Apply Directional Momentum Vectors
            if (bike.isGrounded) {
                bike.vx = Math.sin(bike.heading) * bike.speed;
                bike.vz = Math.cos(bike.heading) * bike.speed;
            } else {
                // Drag reduction in air
                bike.vx = THREE.MathUtils.lerp(bike.vx, Math.sin(bike.heading) * bike.speed, 0.02);
                bike.vz = THREE.MathUtils.lerp(bike.vz, Math.cos(bike.heading) * bike.speed, 0.02);
                bike.vy -= GRAVITY * 0.1; // Apply Gravity weight
            }

            bike.x += bike.vx;
            bike.y += bike.vy;
            bike.z += bike.vz;

            // 4. Ground Collision & Suspension Calculation
            const currentGroundHeight = getTerrainHeight(bike.x, bike.z);
            const bikeRadius = 0.4; // Height off center pivot to bottom of wheels

            if (bike.y <= currentGroundHeight + bikeRadius) {
                // Snap to ground surface mesh
                bike.y = currentGroundHeight + bikeRadius;
