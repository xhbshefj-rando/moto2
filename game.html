<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>3D Motocross Game - Stable Build</title> 
    <style> 
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        } 
        body, html { 
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif; 
            background: #050510;
            user-select: none;
        } 
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .menu-screen { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            width: 100%;
            max-width: 500px;
            background: rgba(0, 0, 0, 0.85); 
            border: 2px solid #00d4ff;
            border-radius: 20px; 
            padding: 40px; 
            text-align: center; 
            pointer-events: auto;
            transition: opacity 0.4s ease, transform 0.4s ease;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        } 
        .menu-screen.hidden { 
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
        } 
        h1 { 
            font-size: 3em; 
            margin-bottom: 10px; 
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.6); 
        } 
        .menu-title { 
            font-size: 1.3em; 
            margin-bottom: 30px; 
            color: #00d4ff; 
        } 
        .menu-options { 
            display: flex;
            flex-direction: column;
            width: 100%; 
        } 
        .menu-btn { 
            padding: 15px; 
            font-size: 1.2em; 
            border: 2px solid #00d4ff; 
            background: rgba(0, 212, 255, 0.1); 
            color: #00d4ff; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            font-weight: bold; 
            text-transform: uppercase; 
        } 
        .menu-btn:hover {
            background: #00d4ff;
            color: #000;
            box-shadow: 0 0 20px #00d4ff;
            transform: scale(1.03);
        }
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00d4ff;
            font-size: 1.5em;
            font-weight: bold;
            font-family: monospace;
            text-shadow: 2px 2px 4px #000;
            display: none;
        }
        .controls-hint {
            margin-top: 20px;
            font-size: 0.85em;
            color: #888;
            line-height: 1.4;
        }
    </style>
    <script src="https://cloudflare.com"></script>
</head> 
<body>

    <div id="canvas-container"></div>

    <div class="ui-layer">
        <div class="menu-screen" id="mainMenu"> 
            <h1>MOTO X 3D</h1> 
            <div class="menu-title">Robust Engine Architecture</div> 
            <div class="menu-options"> 
                <button class="menu-btn" id="startBtn">Start Race</button> 
            </div> 
            <div class="controls-hint">
                W/A/S/D or Arrow Keys to Drive & Balance<br>
                Press <strong>R</strong> to Reset Bike Position
            </div>
        </div>

        <div class="hud" id="gameHud">SPEED: <span id="speedTxt">0</span> MPH</div>
    </div>

    <script>
        // --- Core Engine & Bounds Config ---
        let scene, camera, renderer, terrain;
        let bike = null, rearWheel = null, frontForkAssembly = null;
        let clock = new THREE.Clock();
        let isPlaying = false;
        const MAP_BOUNDS = 240; // Safe threshold constraint before resetting

        // --- Optimized Physics Tuning ---
        let speed = 0;
        const maxSpeed = 0.8;
        const acceleration = 0.015;
        const deceleration = 0.96; // Improved stopping response
        let bikeRotation = 0;
        const turnSpeed = 0.04;

        // --- Recycled Particle Buffer Config ---
        let dirtParticles = [];
        const maxDirtParticles = 200;
        let nextParticleIndex = 0; // Fixed index tracking pointer (Stops memory leak bottlenecks)
        let particleGeometry, particleMaterial, particleSystem;

        // --- Input Map Tracking ---
        const keys = { 
            w: false, a: false, s: false, d: false, 
            arrowup: false, arrowleft: false, arrowdown: false, arrowright: false 
        };

        // Case-Insensitive Keyboard Event Sanitization Filters (Fixes Capitalization Bug)
        window.addEventListener('keydown', (e) => { 
            const keyNormalized = e.key.toLowerCase();
            if (keyNormalized === 'r') { resetBikePosition(); return; }
            if (keys.hasOwnProperty(keyNormalized)) keys[keyNormalized] = true; 
        });
        window.addEventListener('keyup', (e) => { 
            const keyNormalized = e.key.toLowerCase();
            if (keys.hasOwnProperty(keyNormalized)) keys[keyNormalized] = false; 
        });

        function initEngine() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            scene.fog = new THREE.FogExp2(0x050510, 0.015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.45);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffaa44, 1.2);
            sunLight.position.set(100, 150, 50);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 1048; // Optimized performance texture allocation maps
            sunLight.shadow.mapSize.height = 1048;
            scene.add(sunLight);

            generateTrackTerrain();
            buildPlayerBike();
            initDirtEngine();

            document.getElementById('startBtn').addEventListener('click', startGame);
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function generateTrackTerrain() {
            const size = 500;
            const segments = 100;
            const geometry = new THREE.PlaneGeometry(size, size, segments, segments);
            geometry.rotateX(-Math.PI / 2);

            const pos = geometry.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i);
                const z = pos.getZ(i);
                let y = Math.sin(x * 0.04) * Math.cos(z * 0.04) * 4 + Math.sin(x * 0.01) * 6;
                
                // Clear immediate spawn coordinates to zero elevation
                if (Math.abs(x) < 15 && Math.abs(z) < 15) y = 0;
                pos.setY(i, y);
            }
            geometry.computeVertexNormals();

            const gridCanvas = document.createElement('canvas');
            gridCanvas.width = 128;
            gridCanvas.height = 128;
            const ctx = gridCanvas.getContext('2d');
            ctx.fillStyle = '#3a2212'; 
            ctx.fillRect(0, 0, 128, 128);
            ctx.fillStyle = '#4d301c'; 
            for(let i=0; i<150; i++) {
                ctx.fillRect(Math.random()*128, Math.random()*128, 3, 3);
            }
            
            const groundTexture = new THREE.CanvasTexture(gridCanvas);
            groundTexture.wrapS = THREE.RepeatWrapping;
            groundTexture.wrapT = THREE.RepeatWrapping;
            groundTexture.repeat.set(40, 40);

            const material = new THREE.MeshStandardMaterial({ 
                map: groundTexture, 
                roughness: 0.95, 
                metalness: 0.05 
            });

            terrain = new THREE.Mesh(geometry, material);
            terrain.receiveShadow = true;
            scene.add(terrain);

            // Starting Pad Base
            const platformGeo = new THREE.BoxGeometry(6, 0.4, 12);
            const platformMat = new THREE.MeshStandardMaterial({ color: 0x1c1c24, roughness: 0.6 });
            const platform = new THREE.Mesh(platformGeo, platformMat);
            platform.position.set(0, -0.2, 0);
            platform.receiveShadow = true;
            scene.add(platform);
        }

        // Precise elevation calculation mapping matrix
        function getTerrainHeight(x, z) {
            // Check world safety boundaries (Fixes boundary falling bug)
            if (Math.abs(x) > MAP_BOUNDS || Math.abs(z) > MAP_BOUNDS) return 0;
            if (Math.abs(x) < 4 && Math.abs(z) < 7) return 0.05; 
            return Math.sin(x * 0.04) * Math.cos(z * 0.04) * 4 + Math.sin(x * 0.01) * 6;
        }

        function buildPlayerBike() {
            bike = new THREE.Group();

            const metalMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.1, metalness: 0.85 });
