<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>3D Motocross Game</title> 
    <style> 
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        } 
        body, html { 
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif; 
            background: #000;
        } 
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .menu-screen { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            width: 100%;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.85); 
            border: 2px solid #00d4ff;
            border-radius: 20px; 
            padding: 40px; 
            text-align: center; 
            pointer-events: auto;
            transition: opacity 0.5s ease, transform 0.5s ease;
        } 
        .menu-screen.hidden { 
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
        } 
        h1 { 
            font-size: 3em; 
            margin-bottom: 10px; 
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.6); 
        } 
        .menu-title { 
            font-size: 1.5em; 
            margin-bottom: 30px; 
            color: #00d4ff; 
        } 
        .menu-options { 
            display: flex;
            flex-direction: column;
            gap: 15px; 
            width: 100%; 
        } 
        .menu-btn { 
            padding: 15px; 
            font-size: 1.2em; 
            border: 2px solid #00d4ff; 
            background: rgba(0, 212, 255, 0.1); 
            color: #00d4ff; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            font-weight: bold; 
            text-transform: uppercase; 
        } 
        .menu-btn:hover {
            background: #00d4ff;
            color: #000;
            box-shadow: 0 0 20px #00d4ff;
            transform: scale(1.03);
        }
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00d4ff;
            font-size: 1.5em;
            font-weight: bold;
            font-family: monospace;
            text-shadow: 2px 2px 4px #000;
            display: none;
        }
        .controls-hint {
            margin-top: 20px;
            font-size: 0.85em;
            color: #888;
        }
    </style>
    <!-- Include Three.js via CDN -->
    <script src="https://cloudflare.com"></script>
</head> 
<body>

    <div id="canvas-container"></div>

    <div class="ui-layer">
        <!-- Main Menu -->
        <div class="menu-screen" id="mainMenu"> 
            <h1>MOTO X 3D</h1> 
            <div class="menu-title">High-Performance Rendering Engine</div> 
            <div class="menu-options"> 
                <button class="menu-btn" onclick="startGame()">Start Race</button> 
            </div> 
            <div class="controls-hint">W/A/S/D or Arrow Keys to Drive & Balance</div>
        </div>

        <!-- Gameplay HUD -->
        <div class="hud" id="gameHud">SPEED: <span id="speedTxt">0</span> MPH</div>
    </div>

    <script>
        // --- Core Engine Architecture ---
        let scene, camera, renderer, terrain;
        let bike, rearWheel;
        let clock = new THREE.Clock();
        let isPlaying = false;

        // --- Physics & Dirt Particle Variables ---
        let speed = 0;
        const maxSpeed = 0.6;
        const acceleration = 0.01;
        const deceleration = 0.98;
        
        let bikeRotation = 0;
        const turnSpeed = 0.03;

        let dirtParticles = [];
        const maxDirtParticles = 150;
        let particleGeometry, particleMaterial, particleSystem;

        // --- Input Tracking ---
        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false };

        window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        // --- Initialize Engine Environment ---
        function initEngine() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            scene.fog = new THREE.FogExp2(0x050510, 0.015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Lighting Setup (Eliminates bad shading/black spots)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffaa44, 1.2);
            sunLight.position.set(100, 150, 50);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            scene.add(sunLight);

            generateTrackTerrain();
            buildPlayerBike();
            initDirtEngine();

            // Set initial cinematic camera angle for menu layout
            camera.position.set(0, 8, -15);
            camera.lookAt(0, 2, 0);

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        // --- Generate Anti-Aliased Track Terrain ---
        function generateTrackTerrain() {
            const size = 400;
            const segments = 120;
            const geometry = new THREE.PlaneGeometry(size, size, segments, segments);
            geometry.rotateX(-Math.PI / 2);

            // Sculpt Realistic Motocross Hills/Valleys programmatically
            const pos = geometry.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i);
                const z = pos.getZ(i);
                // Combine sine waves to create organic dirt track topography
                const y = Math.sin(x * 0.05) * Math.cos(z * 0.05) * 3 + Math.sin(x * 0.01) * 5;
                pos.setY(i, y);
            }
            geometry.computeVertexNormals();

            // Ground texture mapping using procedural canvas grid
            const gridCanvas = document.createElement('canvas');
            gridCanvas.width = 256;
            gridCanvas.height = 256;
            const ctx = gridCanvas.getContext('2d');
            ctx.fillStyle = '#3a2212'; // Base rich mud/dirt tone
            ctx.fillRect(0, 0, 256, 256);
            ctx.fillStyle = '#4d301c'; // Rough topography variance patches
            for(let i=0; i<400; i++) {
                ctx.fillRect(Math.random()*256, Math.random()*256, 4, 4);
            }
            
            const groundTexture = new THREE.CanvasTexture(gridCanvas);
            groundTexture.wrapS = THREE.RepeatWrapping;
            groundTexture.wrapT = THREE.RepeatWrapping;
            groundTexture.repeat.set(40, 40);

            const material = new THREE.MeshStandardMaterial({ 
                map: groundTexture, 
                roughness: 0.9, 
                metalness: 0.1 
            });

            terrain = new THREE.Mesh(geometry, material);
            terrain.receiveShadow = true;
            scene.add(terrain);
        }

        // --- Get Accurate Terrain Elevation (Anti-Clip/Anti-Bug) ---
        function getTerrainHeight(x, z) {
            if (!terrain) return 0;
            // Analytical approximation matching the procedural formula above
            return Math.sin(x * 0.05) * Math.cos(z * 0.05) * 3 + Math.sin(x * 0.01) * 5;
        }

        // --- Build Modular 3D Bike Asset ---
        function buildPlayerBike() {
            bike = new THREE.Group();

            // Lightweight high-performance material setups
            const metalMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.2, metalness: 0.8 });
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x00d4ff, roughness: 0.5, metalness: 0.4 });
            const rubberMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });

            // Main chassis frame
            const frameGeo = new THREE.BoxGeometry(0.4, 0.6, 2);
            const frame = new THREE.Mesh(frameGeo, bodyMat);
            frame.position.y = 1.2;
            frame.castShadow = true;
            bike.add(frame);

            // Rear Tire setup
            const wheelGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.4, 16);
            wheelGeo.rotateZ(Math.PI / 2);
            rearWheel = new THREE.Mesh(wheelGeo, rubberMat);
            rearWheel.position.set(0, 0.6, -1);
            rearWheel.castShadow = true;
            bike.add(rearWheel);

            // Front Tire setup
