<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>3D Motocross Game</title> 
    <style> 
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        } 
        body, html { 
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif; 
            background: #050510;
            user-select: none;
        } 
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00d4ff;
            font-size: 1.5em;
            font-weight: bold;
            font-family: monospace;
            text-shadow: 2px 2px 4px #000;
        }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 0.9em;
            color: #888;
            line-height: 1.4;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
        /* Settings Toggle Button */
        .settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: auto;
            background: rgba(0, 212, 255, 0.2);
            border: 2px solid #00d4ff;
            color: #00d4ff;
            padding: 10px 20px;
            font-size: 1em;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 20;
        }
        .settings-btn:hover {
            background: #00d4ff;
            color: #000;
            box-shadow: 0 0 15px #00d4ff;
        }
        /* Settings Panel Window */
        .settings-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 90%;
            max-width: 400px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #00d4ff;
            border-radius: 15px;
            padding: 30px;
            color: #fff;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            z-index: 30;
        }
        .settings-panel.active {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }
        .settings-panel h2 {
            text-align: center;
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 1.8em;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }
        .setting-group {
            margin-bottom: 20px;
        }
        .setting-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 0.9em;
            color: #aaa;
        }
        .setting-options {
            display: flex;
            gap: 10px;
        }
        .opt-btn {
            flex: 1;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .opt-btn:hover {
            border-color: #00d4ff;
        }
        .opt-btn.selected {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
            color: #00d4ff;
        }
        .close-settings {
            width: 100%;
            padding: 12px;
            background: #00d4ff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .close-settings:hover {
            background: #00b2d6;
        }
    </style>
    <script src="https://cloudflare.com"></script>
</head> 
<body>

    <div id="canvas-container"></div>

    <div class="ui-layer">
        <div class="hud" id="gameHud">SPEED: <span id="speedTxt">0</span> MPH</div>
        
        <button class="settings-btn" id="settingsToggleBtn" onclick="toggleSettings()">Settings</button>
        
        <!-- Settings Overlay Panel -->
        <div class="settings-panel" id="settingsPanel">
            <h2>Game Settings</h2>
            
            <!-- Environment Customization -->
            <div class="setting-group">
                <label>TRACK TYPE</label>
                <div class="setting-options">
                    <button class="opt-btn selected" id="env-dirt" onclick="setEnvironment('dirt')">Dirt</button>
                    <button class="opt-btn" id="env-street" onclick="setEnvironment('street')">Street</button>
                </div>
            </div>
            
            <!-- Bike Color Customization -->
            <div class="setting-group">
                <label>BIKE BODY COLOR</label>
                <div class="setting-options">
                    <button class="opt-btn selected" id="col-cyan" onclick="setBikeColor(0x00d4ff, 'cyan')">Cyan</button>
                    <button class="opt-btn" id="col-red" onclick="setBikeColor(0xff2a2a, 'red')">Red</button>
                    <button class="opt-btn" id="col-green" onclick="setBikeColor(0x2aff2a, 'green')">Green</button>
                </div>
            </div>

            <!-- Bike Frame/Wheel Scale Modification -->
            <div class="setting-group">
                <label>WHEEL VARIANT</label>
                <div class="setting-options">
                    <button class="opt-btn selected" id="wh-normal" onclick="setWheelSize(0.5, 'normal')">Stock</button>
                    <button class="opt-btn" id="wh-monster" onclick="setWheelSize(0.75, 'monster')">Monster</button>
                </div>
            </div>
            
            <button class="close-settings" onclick="toggleSettings()">Resume Game</button>
        </div>

        <div class="controls-hint">
            <strong>Controls:</strong> W/A/S/D or Arrow Keys to Drive & Balance<br>
            Press <strong>R</strong> to Reset Bike Position
        </div>
    </div>

    <script>
        // --- Core Engine Configuration Architecture ---
        let scene, camera, renderer, terrain, sunLight;
        let bike = null, rearWheel = null, frontWheelMesh = null, frontForkAssembly = null, frameMesh = null;
        let clock = new THREE.Clock();
        const MAP_BOUNDS = 240; 
        let isSettingsOpen = false;

        // --- Customization Settings Configuration ---
        let currentEnv = 'dirt';
        let currentBikeColor = 0x00d4ff;
        let currentWheelRadius = 0.5;

        // --- Kinematic Movement Constants Setup ---
        let speed = 0;
        const maxSpeed = 0.8;
        const acceleration = 0.015;
        const deceleration = 0.96; 
        let bikeRotation = 0;
        const turnSpeed = 0.04;

        // --- Recycled Particle Buffers Configuration ---
        let dirtParticles = [];
        const maxDirtParticles = 200;
        let nextParticleIndex = 0; 
        let particleGeometry, particleMaterial, particleSystem;

        // --- Sanitized Control Framework Mappings ---
        const keys = { 
            w: false, a: false, s: false, d: false, 
            arrowup: false, arrowleft: false, arrowdown: false, arrowright: false 
        };

        window.addEventListener('keydown', (e) => { 
            if (isSettingsOpen) return; // Prevent controlling bike while editing settings
            const keyNormalized = e.key.toLowerCase();
            if (keyNormalized === 'r') { resetBikePosition(); return; }
            if (keys.hasOwnProperty(keyNormalized)) keys[keyNormalized] = true; 
        });
        window.addEventListener('keyup', (e) => { 
            const keyNormalized = e.key.toLowerCase();
            if (keys.hasOwnProperty(keyNormalized)) keys[keyNormalized] = false; 
        });

        // --- Graphics Compilation and Loading Sequence Pipeline ---
        function initEngine() {
            const container = document.getElementById('canvas-container');
            if (!container) return;
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            scene.fog = new THREE.FogExp2(0x050510, 0.015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.45);
            scene.add(ambientLight);

            sunLight = new THREE.DirectionalLight(0xffaa44, 1.2);
            sunLight.position.set(100, 150, 50);
            sunLight.castShadow = true;
