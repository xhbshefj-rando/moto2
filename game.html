<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>3D Moto Racing Engine</title> 
    <style> 
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        } 
        body, html { 
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif; 
            background: #0b0b1e;
            user-select: none;
        } 
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00d4ff;
            font-size: 1.8em;
            font-weight: bold;
            font-family: monospace;
            text-shadow: 2px 2px 5px #000;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 15px;
            border-radius: 6px;
        }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 0.9em;
            color: #ccc;
            line-height: 1.5;
            background: rgba(0, 0, 0, 0.75);
            padding: 12px 18px;
            border-radius: 8px;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }
        .settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: auto;
            background: rgba(0, 212, 255, 0.25);
            border: 2px solid #00d4ff;
            color: #00d4ff;
            padding: 12px 24px;
            font-size: 1em;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .settings-btn:hover {
            background: #00d4ff;
            color: #000;
            box-shadow: 0 0 15px #00d4ff;
        }
        .settings-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 90%;
            max-width: 400px;
            background: rgba(10, 10, 25, 0.95);
            border: 2px solid #00d4ff;
            border-radius: 15px;
            padding: 30px;
            color: #fff;
            opacity: 0;
            pointer-events: none;
            transition: all 0.25s cubic-bezier(0.1, 0.8, 0.3, 1);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.4);
        }
        .settings-panel.active {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }
        .settings-panel h2 {
            text-align: center;
            color: #00d4ff;
            margin-bottom: 25px;
            font-size: 1.8em;
        }
        .setting-group {
            margin-bottom: 22px;
        }
        .setting-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 0.85em;
            color: #8a9bb4;
            letter-spacing: 1px;
        }
        .setting-options {
            display: flex;
            gap: 10px;
        }
        .opt-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #334460;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .opt-btn:hover {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.05);
        }
        .opt-btn.selected {
            background: rgba(0, 212, 255, 0.25);
            border-color: #00d4ff;
            color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.15);
        }
        .close-settings {
            width: 100%;
            padding: 14px;
            background: #00d4ff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 15px;
        }
        .close-settings:hover {
            background: #00b2d6;
        }
    </style>
    <script src="https://cloudflare.com"></script>
</head> 
<body>

    <div id="canvas-container"></div>

    <div class="ui-layer">
        <div class="hud" id="gameHud">SPEED: <span id="speedTxt">0</span> MPH</div>
        
        <button class="settings-btn" id="settingsToggleBtn" onclick="toggleSettings()">Garage / Settings</button>
        
        <div class="settings-panel" id="settingsPanel">
            <h2>Garage Customizer</h2>
            
            <div class="setting-group">
                <label>TRACK ENVIRONMENT</label>
                <div class="setting-options">
                    <button class="opt-btn selected" id="env-dirt" onclick="setEnvironment('dirt')">Dirt Track</button>
                    <button class="opt-btn" id="env-street" onclick="setEnvironment('street')">Asphalt</button>
                </div>
            </div>
            
            <div class="setting-group">
                <label>BIKE PLASTICS COLOR</label>
                <div class="setting-options">
                    <button class="opt-btn selected" id="col-cyan" onclick="setBikeColor(0x00d4ff, 'cyan')">Cyan</button>
                    <button class="opt-btn" id="col-red" onclick="setBikeColor(0xff3333, 'red')">Red</button>
                    <button class="opt-btn" id="col-green" onclick="setBikeColor(0x33ff33, 'green')">Green</button>
                </div>
            </div>

            <div class="setting-group">
                <label>TIRE STYLE</label>
                <div class="setting-options">
                    <button class="opt-btn selected" id="wh-normal" onclick="setWheelSize(0.5, 'normal')">Stock</button>
                    <button class="opt-btn" id="wh-monster" onclick="setWheelSize(0.75, 'monster')">Monster</button>
                </div>
            </div>
            
            <button class="close-settings" onclick="toggleSettings()">Back to Race</button>
        </div>

        <div class="controls-hint">
            <strong>Controls:</strong> W/S (or Up/Down) to Throttle & Brake<br>
            A/D (or Left/Right) to Lean & Turn Corner<br>
            Press <strong>R</strong> to Recover Bike Position
        </div>
    </div>

    <script>
        // --- Core Engine Architecture Config ---
        let scene, camera, renderer, terrain, sunLight, ambientLight;
        let bike = null, rearWheel = null, frontWheelMesh = null, frontForkAssembly = null;
        let clock = new THREE.Clock();
        const MAP_BOUNDS = 240; 
        let isSettingsOpen = false;

        // --- Customization Settings Configuration ---
        let currentEnv = 'dirt';
        let currentBikeColor = 0x00d4ff;
        let currentWheelRadius = 0.5;

        // --- Kinematic Movement Constants Setup ---
        let speed = 0;
        const maxSpeed = 1.2; 
        const acceleration = 0.025;
        const deceleration = 0.95; 
        let bikeRotation = 0;
        const turnSpeed = 0.045;

        // --- Dynamic Camera Physics Lerp Factor ---
        let targetCamDistance = 7.5;
        let cameraYOffset = 3.0;

        // --- Recycled Particle Buffers Configuration ---
        let dirtParticles = [];
        const maxDirtParticles = 200;
        let nextParticleIndex = 0; 
        let particleGeometry, particleMaterial, particleSystem;

        // --- Input Controls Dictionary ---
        const keys = { 
            w: false, a: false, s: false, d: false, 
            arrowup: false, arrowleft: false, arrowdown: false, arrowright: false 
        };

        window.addEventListener('keydown', (e) => { 
            if (isSettingsOpen) return; 
            const keyNormalized = e.key.toLowerCase();
            if (keyNormalized === 'r') { resetBikePosition(); return; }
            if (keys.hasOwnProperty(keyNormalized)) keys[keyNormalized] = true; 
        });
        window.addEventListener('keyup', (e) => { 
            const keyNormalized = e.key.toLowerCase();
            if (keys.hasOwnProperty(keyNormalized)) keys[keyNormalized] = false; 
        });

        // --- Graphics Engine Bootstrap Initialization ---
        function initEngine() {
            const container = document.getElementById('canvas-container');
            if (!container) return;
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a2130);
            scene.fog = new THREE.FogExp2(0x1a2130, 0.012);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            sunLight = new THREE.DirectionalLight(0xfff3e0, 1.4);
            sunLight.position.set(80, 120, 40);
            sunLight.castShadow = true;
