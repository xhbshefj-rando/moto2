<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Motocross Simulator</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: linear-gradient(to bottom, #87CEEB 0%, #b0e2ff 60%, #e0f6ff 100%); box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-radius: 8px; }
        #ui { position: absolute; top: 30px; left: 30px; color: #222; font-weight: bold; pointer-events: none; }
        h1 { margin: 0 0 5px 0; font-size: 24px; color: #111; }
        .controls { margin-top: 15px; font-size: 13px; color: #444; background: rgba(255,255,255,0.7); padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div id="ui">
        <h1>MOTO ARCADE SIM</h1>
        <p>Speed: <span id="speed">0</span> km/h</p>
        <p>Airtime: <span id="airtime">0.0</span>s</p>
        <div class="controls">
            <b>W / S</b> : Throttle / Brake<br>
            <b>A / D</b> : Lean Back / Forward (Air Control)
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Set fixed resolution
        canvas.width = 1024;
        canvas.height = 576;

        // --- GAME PHYSICS STATE ---
        const bike = {
            x: 200,
            y: 100,
            vx: 0,
            vy: 0,
            speed: 0,
            targetSpeed: 0,
            rotation: 0, // In radians
            isGrounded: false,
            airTime: 0,
            radius: 18
        };

        const CONTROLS = { w: false, a: false, s: false, d: false };
        const GRAVITY = 0.35;
        const FRICTION = 0.98;
        
        // --- MATHEMATICAL TRACK PROFILE ---
        // Generates rolling dirt terrain hills, massive jumps, and a rough landing zone
        function getTrackHeight(x) {
            // Base rolling hills layout
            let height = 420 + Math.sin(x * 0.005) * 60;
            
            // Large SX style step-up jump ramp
            if (x > 500 && x < 800) {
                height -= Math.sin((x - 500) * Math.PI / 300) * 110;
            }
            
            // Continuous rhythmic bumps (Whoops section)
            if (x > 1100 && x < 1800) {
                height += Math.sin(x * 0.12) * 12;
            }

            // Big finish-line double jump
            if (x > 2100 && x < 2400) {
                height -= Math.sin((x - 2100) * Math.PI / 300) * 130;
            }
            return height;
        }

        // --- INPUT HANDLING ---
        window.addEventListener('keydown', (e) => { if (e.key.toLowerCase() in CONTROLS) CONTROLS[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if (e.key.toLowerCase() in CONTROLS) CONTROLS[e.key.toLowerCase()] = false; });

        const speedUI = document.getElementById('speed');
        const airtimeUI = document.getElementById('airtime');

        // --- CORE SIMULATION LOOP ---
        function update() {
            // 1. Throttle / Braking power inputs
            if (CONTROLS.w) {
                bike.targetSpeed = 7;
            } else if (CONTROLS.s) {
                bike.targetSpeed = -2;
            } else {
                bike.targetSpeed = 0;
            }
            // Linear acceleration step
            bike.speed += (bike.targetSpeed - bike.speed) * 0.05;

            // 2. Air control layout leaning (Pitching front wheel up or down)
            if (!bike.isGrounded) {
                if (CONTROLS.a) bike.rotation -= 0.04; // Lean back / pull up front wheel
                if (CONTROLS.d) bike.rotation += 0.04; // Lean forward / push down front wheel
            }

            // 3. Movement and Vector Momentum
            if (bike.isGrounded) {
                // Drive along the slope vector direction
                bike.vx = Math.cos(bike.rotation) * bike.speed;
                bike.vy = Math.sin(bike.rotation) * bike.speed;
            } else {
                // Free falling physics application
                bike.vy += GRAVITY;
                bike.vx *= FRICTION;
            }

            bike.x += bike.vx;
            bike.y += bike.vy;

            // Loop track boundaries smoothly
            if (bike.x > 3000) bike.x = 100;
            if (bike.x < 0) bike.x = 10;

            // 4. Ground Collision snap checks
            const groundY = getTrackHeight(bike.x);
            
            if (bike.y >= groundY - bike.radius) {
                // Landed on the floor mesh boundary
                bike.y = groundY - bike.radius;
                bike.vy = 0;

                // Dynamically find slope vector layout to tilt chassis
                const lookAheadX = bike.x + 15;
                const lookAheadY = getTrackHeight(lookAheadX);
                const groundSlope = Math.atan2(lookAheadY - groundY, lookAheadX - bike.x);

                if (!bike.isGrounded) {
                    // Explode or crash check if rider lands horribly upside down
                    let landingAngleDiff = Math.abs(bike.rotation - groundSlope);
                    while (landingAngleDiff > Math.PI) landingAngleDiff -= Math.PI * 2;
                    
                    // Crash stabilization reset
                    if (Math.abs(landingAngleDiff) > 1.2) {
                        bike.speed = 0; // Simple penalty for bad landings
                    }
                }

                // Snap chassis rotation cleanly to match the ground hills slope
                bike.rotation = groundSlope;
                bike.isGrounded = true;
                bike.airTime = 0;
            } else {
                // Actor is airborne
                bike.isGrounded = false;
                bike.airTime += 1 / 60;
            }

            // --- DRAWING GRAPHICS ---
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dynamic tracking side-scrolling camera window offset view
            const cameraX = bike.x - 300;

            // Draw Sun Visual Accent
            ctx.fillStyle = '#FFFACD';
            ctx.beginPath();
            ctx.arc(850, 90, 50, 0, Math.PI * 2);
            ctx.fill();

            // Draw Terrain Dirt Line
            ctx.fillStyle = '#9f5f3f';
            ctx.strokeStyle = '#6d3c22';
            ctx.lineWidth = 6;
            ctx.beginPath();
            
            // Build terrain line cross section relative to camera viewport frames
            ctx.moveTo(0, canvas.height);
            for (let screenX = 0; screenX <= canvas.width; screenX += 5) {
                let worldX = screenX + cameraX;
                let worldY = getTrackHeight(worldX);
                ctx.lineTo(screenX, worldY);
            }
            ctx.lineTo(canvas.width, canvas.height);
            ctx.fill();
            ctx.stroke();

            // Draw Grid Markings on Track for Speed Visual Perspective
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 2;
            for (let gridX = Math.floor(cameraX / 60) * 60; gridX < cameraX + canvas.width; gridX += 60) {
                let screenGridX = gridX - cameraX;
                ctx.beginPath();
                ctx.moveTo(screenGridX, getTrackHeight(gridX));
                ctx.lineTo(screenGridX, canvas.height);
                ctx.stroke();
            }

            // --- DRAW ENGINE MOTORCYCLE GRAPHICS ---
            ctx.save();
            // Translate drawing grid coordinates directly directly over bike epicenter location
            ctx.translate(bike.x - cameraX, bike.y);
            ctx.rotate(bike.rotation);

            // 1. Thick Deep Tread Tires
            ctx.fillStyle = '#222';
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            // Rear Wheel
            ctx.beginPath(); ctx.arc(-22, 5, 11, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            // Front Wheel
            ctx.beginPath(); ctx.arc(22, 5, 11, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

            // 2. High Stability Silver Suspension swingarms forks
            ctx.strokeStyle = '#b0b0b0';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-22, 5); ctx.lineTo(-5, -5); // Rear suspension link
            ctx.moveTo(22, 5); ctx.lineTo(8, -18);   // Front fork structure
            ctx.stroke();

            // 3. Main Dark Metallic Frame Chassis Case
            ctx.fillStyle = '#111';
            ctx.fillRect(-12, -10, 22, 12);

            // 4. Factory Racing Orange Plastics Body Shell
            ctx.fillStyle = '#ff4500';
            ctx.beginPath();
            ctx.moveTo(-18, -10);
            ctx.lineTo(10, -14);
            ctx.lineTo(16, -8);
            ctx.lineTo(-10, -5);
            ctx.closePath();
            ctx.fill();

            // 5. Handlebars
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(6, -18);
            ctx.lineTo(12, -22);
            ctx.stroke();

            ctx.restore();

            // --- REFRESH INDICATOR VALUE DATA OVERLAYS ---
            speedUI.textContent = Math.round(Math.abs(bike.speed) * 18);
            airtimeUI.textContent = bike.airTime.toFixed(1);

            requestAnimationFrame(update);
        }

        // Initialize execution setup loop sequence
        update();
    </script>
</body>
</html>
