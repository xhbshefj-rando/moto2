<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Motocross - Camera Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top:0; left:0; z-index: 1; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; z-index: 10; }
        h1 { margin: 0 0 5px 0; font-size: 24px; }
        p { margin: 5px 0; font-size: 14px; }
        .controls { margin-top: 15px; font-size: 12px; opacity: 0.9; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 5px; }
    </style>
    <script src="https://cloudflare.com"></script>
</head>
<body>
    <div id="ui">
        <h1>3D MOTO SIM</h1>
        <p>Speed: <span id="speed">0</span> km/h</p>
        <p>Airtime: <span id="airtime">0.0</span>s</p>
        <div class="controls">
            <b>W / S</b> : Gas / Brake<br>
            <b>A / D</b> : Lean & Turn<br>
            <b>Arrow Up / Down</b> : Pitch Nose (In Air)
        </div>
    </div>
    <div id="canvas-container"></div>

    <script>
        function nativeLerp(start, end, amt) { return (1 - amt) * start + amt * end; }

        // --- MATH-BASED GROUND HEIGHTS ---
        function getTrackHeight(x, z) {
            if (Math.abs(x) > 500 || Math.abs(z) > 500) return 0;
            var height = Math.sin(x * 0.02) * Math.cos(z * 0.02) * 10; // Basic track hills
            height += Math.sin(z * 0.15) * 1.2; // Rhythmic whoops sections
            
            // Large jump ramp section right ahead of starting zone
            if (z > 30 && z < 150 && Math.abs(x) < 60) {
                height += Math.sin((z - 30) * Math.PI / 120) * 20; 
            }
            return height;
        }

        // --- VEHICLE INITIAL PHYSICS STATE ---
        var bike = { 
            x: 0, y: 15, z: -20, // Spawned close to center origin
            vx: 0, vy: 0, vz: 0, 
            speed: 0, heading: 0, pitch: 0, roll: 0, 
            isGrounded: false, airTime: 0 
        };

        var CONTROLS = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false };
        var GRAVITY = 0.22;
        var ACCELERATION = 0.12;
        var MAX_SPEED = 1.6;
        var FRICTION = 0.02;

        // --- ENGINE GENERATOR ---
        var container = document.getElementById('canvas-container');
        var scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.003);

        var camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // Manual hard reset on camera start frame configuration to look directly forward
        camera.position.set(0, 18, -30);

        var renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // --- LIGHTS ---
        var ambient = new THREE.AmbientLight(0xffffff, 0.9);
        scene.add(ambient);
        var sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(100, 300, 100);
        scene.add(sun);

        // --- PROCEDURAL GENERATED GRID MATERIAL ---
        var canvasTex = document.createElement('canvas');
        canvasTex.width = 64;
        canvasTex.height = 64;
        var ctx = canvasTex.getContext('2d');
        ctx.fillStyle = '#9f5f3f'; // Distinct dark orange dirt color
        ctx.fillRect(0, 0, 64, 64);
        ctx.strokeStyle = '#7c4324'; // High visibility grid lines for motion perspective
        ctx.lineWidth = 3;
        ctx.strokeRect(0, 0, 64, 64);
        
        var texture = new THREE.CanvasTexture(canvasTex);
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.RepeatWrapping;
        texture.repeat.set(200, 200); 

        // --- GENERATE TRACK GRID MESH ---
        var terrainGeo = new THREE.PlaneGeometry(1000, 1000, 90, 90);
        terrainGeo.rotateX(-Math.PI / 2); 
        var posAttribute = terrainGeo.attributes.position;
        for (var i = 0; i < posAttribute.count; i++) {
            var vx = posAttribute.getX(i);
            var vz = posAttribute.getZ(i);
            posAttribute.setY(i, getTrackHeight(vx, vz));
        }
        terrainGeo.computeVertexNormals();

        var terrainMat = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.9 });
        var terrainMesh = new THREE.Mesh(terrainGeo, terrainMat);
        scene.add(terrainMesh);

        // --- GRAPHICS: HIGH-CONTRAST MOTO BIKE ASSEMBLY ---
        var bikeGroup = new THREE.Group();
        
        var chassisMat = new THREE.MeshStandardMaterial({ color: 0x111111 }); // Black metal core
        var plasticMat = new THREE.MeshStandardMaterial({ color: 0xff4500 }); // Neon Racing Orange plastics
        var tireMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 1.0 }); // Deep dark tires
        var spokeMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true }); // Bright white wheel rims

        // Main Engine Base Frame Box
        var coreChassis = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.6, 1.4), chassisMat);
        coreChassis.position.y = 0.6;
        bikeGroup.add(coreChassis);

        // Racing Plastics body shell
        var plastics = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.3, 1.1), plasticMat);
        plastics.position.set(0, 0.85, -0.1);
        bikeGroup.add(plastics);

        // Handlebars cross bar structure
        var barGeom = new THREE.CylinderGeometry(0.03, 0.03, 1.1);
        barGeom.rotateZ(Math.PI / 2);
        var bars = new THREE.Mesh(barGeom, chassisMat);
        bars.position.set(0, 1.25, 0.4);
        bikeGroup.add(bars);

        // Front Wheel Structure
        var wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.28, 12);
        wheelGeo.rotateZ(Math.PI / 2);
        
        var frontWheel = new THREE.Mesh(wheelGeo, tireMat);
        frontWheel.position.set(0, 0.5, 0.7);
        var frontSpokes = new THREE.Mesh(wheelGeo, spokeMat);
        frontWheel.add(frontSpokes); 
        bikeGroup.add(frontWheel);

        // Rear Wheel Structure
        var rearWheel = new THREE.Mesh(wheelGeo, tireMat);
        rearWheel.position.set(0, 0.5, -0.7);
        var rearSpokes = new THREE.Mesh(wheelGeo, spokeMat);
        rearWheel.add(rearSpokes);
        bikeGroup.add(rearWheel);

        scene.add(bikeGroup);

        // --- HARDWARE CONFIG DETECTORS ---
        window.addEventListener('keydown', function(e) { if(e.key in CONTROLS) CONTROLS[e.key] = true; });
        window.addEventListener('keyup', function(e) { if(e.key in CONTROLS) CONTROLS[e.key] = false; });
        window.addEventListener('resize', function() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        var speedUI = document.getElementById('speed');
        var airtimeUI = document.getElementById('airtime');

        // --- RUNNING FRAME LOOP ---
        function loop() {
            requestAnimationFrame(loop);

            // 1. Steering calculations
            if (CONTROLS.a) {
                if (bike.isGrounded) bike.heading += 0.026 * (bike.speed / MAX_SPEED + 0.2);
                bike.roll = nativeLerp(bike.roll, 0.38, 0.1);
            } else if (CONTROLS.d) {
                if (bike.isGrounded) bike.heading -= 0.026 * (bike.speed / MAX_SPEED + 0.2);
                bike.roll = nativeLerp(bike.roll, -0.38, 0.1);
            } else {
                bike.roll = nativeLerp(bike.roll, 0, 0.15);
            }

            // 2. Air control layout inputs
            if (!bike.isGrounded) {
                if (CONTROLS.ArrowUp) bike.pitch -= 0.038;
                if (CONTROLS.ArrowDown) bike.pitch += 0.038;
            }

            // 3. Engine Throttle modifiers
            if (CONTROLS.w) {
                bike.speed = Math.min(bike.speed + ACCELERATION, MAX_SPEED);
            } else if (CONTROLS.s) {
                bike.speed = Math.max(bike.speed - ACCELERATION * 1.3, -MAX_SPEED * 0.25);
            } else {
                bike.speed = nativeLerp(bike.speed, 0, FRICTION);
            }

            // 4. Momentum tracking transformations
            if (bike.isGrounded) {
                bike.vx = Math.sin(bike.heading) * bike.speed;
                bike.vz = Math.cos(bike.heading) * bike.speed;
                bike.vy = 0;
            } else {
                bike.vy -= GRAVITY * 0.13; 
            }

            bike.x += bike.vx;
            bike.y += bike.vy;
            bike.z += bike.vz;

            // 5. Collision height matching snap properties
            var groundLevel = getTrackHeight(bike.x, bike.z);
            var groundClearance = 0.5;

            if (bike.y <= groundLevel + groundClearance) {
                bike.y = groundLevel + groundClearance;
                var lookAheadHeight = getTrackHeight(bike.x + Math.sin(bike.heading) * 2, bike.z + Math.cos(bike.heading) * 2);
                var planeSlope = Math.atan2(groundLevel - lookAheadHeight, 2);
                
                bike.pitch = nativeLerp(bike.pitch, planeSlope, 0.25);
                bike.isGrounded = true;
                bike.airTime = 0;
            } else {
                bike.isGrounded = false;
                bike.airTime += 1 / 60;
            }

            // Enforce hard boundary checks
            bike.x = Math.max(-470, Math.min(470, bike.x));
            bike.z = Math.max(-470, Math.min(470, bike.z));

            // 6. Update bike visual assets position
            bikeGroup.position.set(bike.x, bike.y, bike.z);
